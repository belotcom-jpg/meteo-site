<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pluie Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            padding: 10px;
        }
        .wrap { max-width: 1400px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }

        .search { display: flex; gap: 8px; }
        input {
            flex: 1; background: #0d0d0d; border: 2px solid #555;
            border-radius: 10px; padding: 14px; color: #fff;
            font-size: 18px; font-weight: 900; font-family: 'Courier New', monospace; outline: none;
        }
        input:focus { border-color: #00ffff; box-shadow: 0 0 12px rgba(0,255,255,0.35); }
        button {
            background: #00ffff; color: #000; border: none; padding: 0 28px;
            border-radius: 10px; font-weight: 900; cursor: pointer;
            font-family: 'Courier New', monospace; font-size: 15px;
        }
        button:hover { background: #fff; }

        .card {
            background: #080808; border: 2px solid #333;
            border-radius: 16px; overflow: hidden; display: flex; flex-direction: column;
        }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; border-bottom: 1px solid #2a2a2a;
        }
        .city-name { font-size: 28px; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; }
        .legend { display: flex; gap: 18px; font-size: 12px; font-weight: 900; letter-spacing: 1px; }
        .leg-rain { color: #00ffff; text-shadow: 0 0 10px rgba(0,255,255,0.6); }
        .leg-prob { color: #ffe600; text-shadow: 0 0 10px rgba(255,230,0,0.6); }

        /*
         * chartWrapper = référentiel commun canvas + résumé.
         * Les sep-line sont en position:absolute dans ce wrapper,
         * de chartArea.top jusqu'au bas du wrapper inclus.
         */
        #chartWrapper { position: relative; }

        .canvas-container { height: 360px; width: 100%; }

        /* Lignes séparatrices injectées par JS */
        .sep-line {
            position: absolute;
            width: 0;
            border-left: 2px dashed rgba(255, 255, 255, 0.82);
            pointer-events: none;
            z-index: 20;
        }

        #summaryRow {
            display: flex;
            border-top: 2px solid #444;
            background: #060606;
            height: 82px;
            overflow: hidden;
        }
        .day-seg {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            flex-shrink: 0; overflow: hidden;
        }
        .day-name { font-size: 10px; font-weight: 900; color: #777; margin-bottom: 3px; letter-spacing: 1px; }
        .day-rain { font-size: 21px; font-weight: 900; color: #00ffff; line-height: 1; text-shadow: 0 0 10px rgba(0,255,255,0.55); }
        .day-prob { font-size: 13px; font-weight: 900; color: #ffe600; margin-top: 2px; }
        .unit     { font-size: 9px; opacity: 0.6; }

        .footer-info {
            font-size: 10px; color: #ffe600; background: #0e0900;
            padding: 7px 20px; font-weight: bold;
            border-top: 2px solid #2e1f00; letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="search">
        <input id="cityInput" value="Paris" onkeypress="if(event.key==='Enter')load()">
        <button onclick="load()">CHERCHER</button>
    </div>

    <div class="card">
        <div class="header">
            <div id="displayCity" class="city-name">—</div>
            <div class="legend">
                <span class="leg-rain">● PLUIE (mm)</span>
                <span class="leg-prob">-- PROBA (%)</span>
            </div>
        </div>

        <div id="chartWrapper">
            <div class="canvas-container">
                <canvas id="mainChart"></canvas>
            </div>
            <div id="summaryRow"></div>
        </div>

        <div class="footer-info">⚠ BIAIS PESSIMISTE J+3→J+7 : PLUIE ×1.2 / PROBA +10%</div>
    </div>
</div>

<script>
let myChart = null;
let lastW   = 0;

/* ────────────────────────── CHARGEMENT ────────────────────────── */
async function load() {
    const city = document.getElementById('cityInput').value.trim();
    if (!city) return;
    try {
        const geo = await fetch(
            `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=fr`
        ).then(r => r.json());
        if (!geo.results?.length) { alert('Ville introuvable'); return; }

        const { latitude, longitude, name } = geo.results[0];
        document.getElementById('displayCity').innerText = name;

        const url = `https://api.open-meteo.com/v1/forecast`
            + `?latitude=${latitude}&longitude=${longitude}`
            + `&hourly=precipitation,precipitation_probability`
            + `&minutely_15=precipitation`
            + `&forecast_days=8&timezone=auto`;

        const data = await fetch(url).then(r => r.json());
        processData(data);
    } catch (e) { console.error(e); }
}

/* ─────────────────────── CONSTRUCTION DES POINTS ──────────────────────
   CORRECTION CRITIQUE : les indices du tableau hourly[] commencent
   à l'heure 0 du jour J. Pour obtenir l'heure (h+i) du jour J,
   il faut utiliser data.hourly.precipitation[h + i], pas [i].
────────────────────────────────────────────────────────────────────── */
function processData(data) {
    const pts = [];
    const now = new Date();
    const h   = now.getHours();
    const m   = now.getMinutes();

    /* Aujourd'hui — 4 créneaux de 15 min à partir de maintenant */
    const nowSlot = h * 4 + Math.floor(m / 15);
    for (let i = 0; i < 4; i++) {
        pts.push({
            t : '',
            r : data.minutely_15.precipitation[nowSlot + i] ?? 0,
            p : data.hourly.precipitation_probability[h]    ?? 0,
            d : 0
        });
    }

    /* Aujourd'hui — heures h+1 à 23  ← INDEX CORRIGÉ : h+i */
    for (let i = 1; i <= (23 - h); i++) {
        pts.push({
            t : (h + i) + 'h',
            r : data.hourly.precipitation[h + i]             ?? 0,
            p : data.hourly.precipitation_probability[h + i] ?? 0,
            d : 0
        });
    }

    /* J+1, J+2 — toutes les 3h */
    for (let d = 1; d <= 2; d++) {
        for (let hr = 0; hr < 24; hr += 3) {
            const idx = d * 24 + hr;
            pts.push({
                t        : hr + 'h',
                r        : data.hourly.precipitation[idx]             ?? 0,
                p        : data.hourly.precipitation_probability[idx] ?? 0,
                d,
                isNewDay : hr === 0
            });
        }
    }

    /* J+3, J+4 — toutes les 6h + biais pessimiste */
    for (let d = 3; d <= 4; d++) {
        for (let hr = 0; hr < 24; hr += 6) {
            const idx = d * 24 + hr;
            pts.push({
                t        : hr + 'h',
                r        : (data.hourly.precipitation[idx]             ?? 0) * 1.2,
                p        : Math.min(100, (data.hourly.precipitation_probability[idx] ?? 0) + 10),
                d,
                isNewDay : hr === 0
            });
        }
    }

    /* J+5 — toutes les 12h + biais */
    for (let hr = 0; hr < 24; hr += 12) {
        const idx = 5 * 24 + hr;
        pts.push({
            t        : hr + 'h',
            r        : (data.hourly.precipitation[idx]             ?? 0) * 1.2,
            p        : Math.min(100, (data.hourly.precipitation_probability[idx] ?? 0) + 10),
            d        : 5,
            isNewDay : hr === 0
        });
    }

    /* J+6, J+7 — 1 point par jour + biais */
    for (let d = 6; d <= 7; d++) {
        const idx = d * 24;
        pts.push({
            t        : '00h',
            r        : (data.hourly.precipitation[idx]             ?? 0) * 1.2,
            p        : Math.min(100, (data.hourly.precipitation_probability[idx] ?? 0) + 10),
            d,
            isNewDay : true
        });
    }

    render(pts);
}

/* ────────────────────────── RENDU CHART ───────────────────────── */
function render(pts) {
    const ctx = document.getElementById('mainChart').getContext('2d');
    if (myChart) myChart.destroy();
    lastW = 0;

    const rainG = ctx.createLinearGradient(0, 0, 0, 360);
    rainG.addColorStop(0,    'rgba(0,255,255,0.72)');
    rainG.addColorStop(0.55, 'rgba(0,255,255,0.18)');
    rainG.addColorStop(1,    'rgba(0,255,255,0)');

    myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels  : pts.map(p => p.t),
            datasets: [
                {
                    data           : pts.map(p => p.r),
                    borderColor    : '#00ffff',
                    borderWidth    : 2.5,
                    fill           : true,
                    backgroundColor: rainG,
                    tension        : 0.4,
                    pointRadius    : 0,
                    yAxisID        : 'y',
                    order          : 1
                },
                {
                    data        : pts.map(p => p.p),
                    borderColor : '#ffe600',
                    borderWidth : 2,
                    borderDash  : [7, 5],
                    tension     : 0.4,
                    pointRadius : 0,
                    yAxisID     : 'yProb',
                    order       : 2
                }
            ]
        },
        options: {
            responsive          : true,
            maintainAspectRatio : false,
            animation           : false,
            scales: {
                x: {
                    ticks  : { color: '#bbb', font: { weight: 'bold', size: 10, family: 'Courier New' }, maxRotation: 0 },
                    grid   : { display: false },
                    border : { color: '#555' }
                },
                y: {
                    position    : 'right',
                    beginAtZero : true,
                    grid        : { color: '#1c1c1c', lineWidth: 1 },
                    ticks       : { color: '#00ffff', font: { weight: 'bold', family: 'Courier New' } },
                    border      : { color: '#555' }
                },
                yProb: { position: 'left', max: 100, display: false }
            },
            plugins: { legend: { display: false } }
        },

        plugins: [{
            id: 'overlaySync',
            afterDraw(chart) {
                if (chart.width === lastW) return;
                lastW = chart.width;
                buildOverlays(chart, pts);
            }
        }]
    });
}

/* ──────────────────────── OVERLAYS ────────────────────────────────
   PRINCIPE D'ALIGNEMENT (garanti pixel-perfect)
   ─────────────────────────────────────────────
   Pour chaque jour d (d > 0), la position X du séparateur est :
       xPos = x.getPixelForValue(dayFirstIdx[d])

   • sep-line  : left = xPos  (absolu dans #chartWrapper)
   • segment d : paddingLeft(row) = chartArea.left
                 width(seg 0) = xPos(day1) − chartArea.left
                 width(seg d) = xPos(day_d+1) − xPos(day_d)

   → Bord gauche du segment d dans le flex row
     = chartArea.left + Σ widths[0..d-1]
     = chartArea.left + (xPos(day_d) − chartArea.left)
     = xPos(day_d)                                        ✓
──────────────────────────────────────────────────────────────────── */
function buildOverlays(chart, pts) {
    const { chartArea, scales: { x }, width: canvasW } = chart;
    const wrapper = document.getElementById('chartWrapper');

    /* Supprimer les anciennes lignes */
    wrapper.querySelectorAll('.sep-line').forEach(el => el.remove());

    /* Index du premier point de chaque jour */
    const dayFirstIdx = {};
    pts.forEach((p, i) => { if (dayFirstIdx[p.d] === undefined) dayFirstIdx[p.d] = i; });
    const days = Object.keys(dayFirstIdx).map(Number).sort((a, b) => a - b);

    /* Hauteur totale wrapper : canvas (360) + summaryRow (82) + border (2) */
    const wH = wrapper.offsetHeight;

    /* Injection des lignes séparatrices pour J+1 … J+7 */
    days.slice(1).forEach(d => {
        const xPos       = x.getPixelForValue(dayFirstIdx[d]);
        const line       = document.createElement('div');
        line.className   = 'sep-line';
        line.style.left  = xPos + 'px';
        line.style.top   = chartArea.top + 'px';
        line.style.height = (wH - chartArea.top) + 'px';
        wrapper.appendChild(line);
    });

    /* Résumé journalier */
    buildSummary(chart, pts, days, dayFirstIdx);
}

function buildSummary(chart, pts, days, dayFirstIdx) {
    const { chartArea, scales: { x }, width: canvasW } = chart;
    const row      = document.getElementById('summaryRow');
    const dayNames = ['DIM','LUN','MAR','MER','JEU','VEN','SAM'];
    const now      = new Date();

    row.style.paddingLeft  = chartArea.left + 'px';
    row.style.paddingRight = (canvasW - chartArea.right) + 'px';
    row.innerHTML = '';

    days.forEach((d, di) => {
        const date   = new Date(); date.setDate(now.getDate() + d);
        const isLast = di === days.length - 1;

        const leftPx  = (di === 0) ? chartArea.left : x.getPixelForValue(dayFirstIdx[d]);
        const rightPx = isLast ? chartArea.right : x.getPixelForValue(dayFirstIdx[days[di + 1]]);
        const width   = Math.max(0, rightPx - leftPx);

        const dayData = pts.filter(p => p.d === d);
        const total   = dayData.reduce((s, p) => s + p.r, 0);
        const maxP    = Math.max(...dayData.map(p => p.p), 0);

        const div          = document.createElement('div');
        div.className      = 'day-seg';
        div.style.width    = width + 'px';
        div.innerHTML = `
            <div class="day-name">${d === 0 ? 'AUJ.' : dayNames[date.getDay()]}</div>
            <div class="day-rain">${total.toFixed(1)}<span class="unit">mm</span></div>
            <div class="day-prob">${Math.round(maxP)}%</div>
        `;
        row.appendChild(div);
    });
}

load();
</script>
</body>
</html>
