<script>
const SOURCES=[
  {key:'icon', label:'ICON',    color:'#4488ff',omModel:'icon_seamless'},
  {key:'gfs',  label:'GFS',     color:'#44dd88',omModel:'gfs_seamless'},
  {key:'ifs',  label:'IFS 9km', color:'#cc44ff',omModel:'ecmwf_ifs025'},
  {key:'aifs', label:'AIFS AI', color:'#dd88ff',omModel:'ecmwf_aifs025_single'},
  {key:'mf',   label:'AROME',   color:'#ff8844',omModel:'meteofrance_seamless'},
  {key:'mfhd', label:'AROME HD',color:'#ff6622',omModel:'meteofrance_arome_france_hd'},
  {key:'gem',  label:'GEM',     color:'#44dddd',omModel:'gem_seamless'},
  {key:'knmi', label:'KNMI',    color:'#88ff44',omModel:'knmi_seamless'},
  {key:'ukmo', label:'UKMO',    color:'#ff4488',omModel:'ukmo_seamless'},
  {key:'metno',label:'MET-NO',  color:'#ff44aa',omModel:null},
];

let myChart=null,lastW=0,cityTz='Europe/Paris',N_HRS=0;
let _peaks=[],_idx8hJ0=-1,_idx8hJ1=-1,_drySlots=[],_rainStarts=[],_8hXPos=[];
let _viewMode='j1',_cachedData=null,_cachedJm1=null,_cachedJm7=null,_simpleMode=true,_gradCache=null;
let _tempJ1Max=null,_tempJ1Min=null,_tempJ0Max=null,_tempJ0Min=null;
let zoomMin=0,zoomMax=1; /* état zoom global */

/* ── applyZoom globale ── */
function applyZoom(){
  if(!myChart)return;
  const n=myChart.data.labels.length;
  const lo=Math.round(zoomMin*n);
  const hi=Math.round(zoomMax*n)-1;
  myChart.options.scales.x.min=lo;
  myChart.options.scales.x.max=hi;
  myChart.update('none');
  updateScrollbar();
}
let _windData=null; /* vitesse vent horaire */
let _rainNowTimer=null;
let _mfRainNow=null; /* données MF pluie dans l'heure */
let _mfByMin={}; /* slots MF par offset-minutes, global */
let _radarMap=null,_radarLayer=null,_radarMarker=null,_radarFrames=[],_radarIdx=0,_radarPlaying=false,_radarTimer=null;
let _cityLat=48.6869,_cityLon=2.3814; /* défaut Juvisy */
let _isMob=false;

/* ── maths ── */
function p80(arr){
  const v=arr.filter(x=>x!=null&&isFinite(x)&&x>=0);
  if(!v.length)return 0;
  const s=[...v].sort((a,b)=>a-b),i=.8*(s.length-1),lo=Math.floor(i),hi=Math.ceil(i);
  return s[lo]+(s[hi]-s[lo])*(i-lo);
}
function maxOf(arr){const v=arr.filter(x=>x!=null&&isFinite(x)&&x>=0);return v.length?Math.max(...v):0}
function interpM15(m15,slotF,off){const t=slotF+off/15,si=Math.floor(t),f=t-si;return Math.max(0,(m15[si]??0)*(1-f)+(m15[si+1]??m15[si]??0)*f)}
function localKey(utcStr){
  const l=new Date(new Date(utcStr).toLocaleString('en-US',{timeZone:cityTz}));
  const p=n=>String(n).padStart(2,'0');
  return `${l.getFullYear()}-${p(l.getMonth()+1)}-${p(l.getDate())}T${p(l.getHours())}:00`;
}

/* ── status inline ── */
function showStatus(msg,color){
  let el=document.getElementById('statusMsg');
  if(!el){
    el=document.createElement('div');el.id='statusMsg';
    el.style.cssText='font-size:10px;font-weight:900;padding:4px 10px;border-radius:6px;font-family:Courier New,monospace;transition:all .3s;min-height:0';
    const vb=document.getElementById('viewBtns');
    vb.parentNode.insertBefore(el,vb);
  }
  el.textContent=msg;el.style.color=color;el.style.display=msg?'block':'none';
}

/* ── badges sources ── */
function initBar(){
  const bar=document.getElementById('sourcesBar');
  bar.style.display='flex';
  bar.innerHTML='<span class="src-lbl">Sources</span>';
  SOURCES.forEach(s=>{
    const b=document.createElement('div');
    b.className='src-badge loading';b.id='b_'+s.key;b.dataset.srcKey=s.key;b.style.borderColor=s.color+'44';
    b.innerHTML=`<div class="src-dot" style="background:${s.color}55"></div>${s.label}`;
    b.addEventListener('mouseenter',()=>highlightSource(s.key));
    b.addEventListener('mouseleave',()=>highlightSource(null));
    bar.appendChild(b);
  });
}
function setBadge(key,ok){
  const b=document.getElementById('b_'+key);if(!b)return;
  const src=SOURCES.find(s=>s.key===key);
  b.className='src-badge '+(ok?'ok':'err');
  if(ok){b.style.borderColor=src.color+'66';b.style.background=src.color+'15';
    const d=b.querySelector('.src-dot');d.style.background=src.color;d.style.boxShadow=`0 0 6px ${src.color}`;d.style.animation='none';
  }else{const d=b.querySelector('.src-dot');d.style.background='#ff3d57';d.style.animation='none';}
}

/* ── toggle complexité ── */
function toggleComplexity(){
  _simpleMode=!_simpleMode;
  const btn=document.getElementById('modeToggle');
  btn.textContent=_simpleMode?'● SIMPLE':'○ COMPLEXE';
  btn.classList.toggle('simple',_simpleMode);
  applyComplexity();
}
function applyComplexity(){
  if(!myChart)return;
  const ds=myChart.data.datasets;
  // indices: 0=fill, 1..9=modèles, 10=MAX bleu, 11=P80 jaune, 12=proba, [13=réel si jm1]
  const nSrc=SOURCES.length; // 10
  const idxFill=0;
  const idxModels=[...Array(nSrc)].map((_,i)=>1+i);  // 1..10
  const idxMax=1+nSrc;    // 11
  const idxP80=2+nSrc;    // 12
  const idxProb=3+nSrc;   // 13
  const idxReal=4+nSrc;   // 14 (J-1 only)

  const sb=document.getElementById('sourcesBar');
  if(_simpleMode){
    if(sb)sb.style.display='none';
    idxModels.forEach(i=>{if(ds[i])ds[i].borderColor='transparent';});
    if(ds[idxFill])ds[idxFill].backgroundColor='rgba(255,230,0,0.22)';
    if(ds[idxMax])ds[idxMax].borderColor='transparent';
    /* proba toujours visible même en simple */
    if(ds[idxReal])ds[idxReal].borderColor='rgba(255,255,255,0.92)';
    /* Rescaler Y sur les données P80 uniquement */
    const p80data=(ds[idxP80]?.data||[]).filter(v=>v!=null&&isFinite(v)&&v>=0);
    const p80max=p80data.length?Math.max(...p80data):1;
    const yMax=Math.max(p80max*1.2,0.5);
    myChart.options.scales.y.max=yMax;
    myChart.options.scales.y.suggestedMax=undefined;
  } else {
    if(sb)sb.style.display='flex';
    SOURCES.forEach((src,si)=>{
      if(ds[1+si])ds[1+si].borderColor=src.color+'50';
    });
    if(ds[idxFill])ds[idxFill].backgroundColor=_gradCache||'rgba(255,230,0,0.18)';
    if(ds[idxMax])ds[idxMax].borderColor='#4488ff';
    if(ds[idxProb]){ds[idxProb].borderColor='rgba(255,255,255,0.85)';ds[idxProb].borderWidth=_isMob?2.5:3.5;ds[idxProb].borderDash=[6,3];}
    if(ds[idxReal])ds[idxReal].borderColor='rgba(255,255,255,0.92)';
    /* Rescaler Y sur MAX toutes courbes */
    const allVals=ds.slice(1,idxProb).flatMap(d=>d.data||[]).filter(v=>v!=null&&isFinite(v)&&v>=0);
    const allMax=allVals.length?Math.max(...allVals):1;
    myChart.options.scales.y.max=undefined;
    myChart.options.scales.y.suggestedMax=undefined;
  }
  myChart.update('none');
}

/* ── retour ville par défaut ── */

  load();

/* ── clear search ── */
function clearSearch(){
  const inp=document.getElementById('cityInput');
  inp.value='';inp.focus();
  document.getElementById('clearBtn').style.display='none';
}
document.addEventListener('DOMContentLoaded',()=>{
  const inp=document.getElementById('cityInput');
  const btn=document.getElementById('clearBtn');
  inp.addEventListener('input',()=>{btn.style.display=inp.value?'block':'none';});
  if(inp.value)btn.style.display='block';
});

/* ── Pluie dans l'heure MF ── */
const MF_TOKEN='__Wj7dVSTjV9YGu1guveLyDq0g7S7TfTjaHBTPTpO0kj8__';
async function fetchRainNow(lat,lon){
  try{
    const url=`https://webservice.meteofrance.com/v3/rain?lat=${lat.toFixed(4)}&lon=${lon.toFixed(4)}&token=${MF_TOKEN}`;
    const r=await fetch(url);
    if(!r.ok)return null;
    return await r.json();
  }catch(e){return null;}
}

function renderRainNow(data){
  const card=document.getElementById('rainNowCard');
  if(!card)return;
  if(!data?.properties?.forecast?.length){card.style.display='none';return;}
  card.dataset.hasData='1';
  _mfRainNow=data.properties.forecast; /* stocker pour intégration courbe */
  card.style.display='block';
  const forecasts=data.properties.forecast;
  /* Intensités : 0=sec,1=faible,2=modérée,3=forte */
  const colors=['#2a2a2a','#4488ff','#0044ff','#ff2200'];
  const labels_fr=['Sec','Faible','Modérée','Forte'];
  const maxH=44; /* px hauteur max barre */
  /* Barres */
  const barsEl=document.getElementById('rainNowBars');
  const labsEl=document.getElementById('rainNowLabels');
  if(!barsEl||!labsEl)return;
  barsEl.innerHTML='';labsEl.innerHTML='';
  /* Temps de référence */
  const t0=forecasts[0]?.time?new Date(forecasts[0].time):new Date();
  let maxIntensity=0;
  forecasts.forEach((f,i)=>{
    const intens=f.rain_intensity||0;
    if(intens>maxIntensity)maxIntensity=intens;
    const h=Math.max(2,Math.round((intens/3)*maxH));
    const bar=document.createElement('div');
    bar.className='rn-bar';
    bar.style.height=h+'px';
    bar.style.background=colors[Math.min(intens,3)];
    if(intens>0)bar.style.boxShadow=`0 0 6px ${colors[Math.min(intens,3)]}88`;
    barsEl.appendChild(bar);
    /* Label minutes */
    const tF=new Date(f.time);
    const diffMin=Math.round((tF-t0)/60000);
    const lbl=document.createElement('div');
    lbl.className='rn-lbl';
    lbl.textContent=diffMin===0?'now':'+'+diffMin+"'";
    labsEl.appendChild(lbl);
  });
  /* Statut global */
  const statusEl=document.getElementById('rainNowStatus');
  if(statusEl){
    if(maxIntensity===0){statusEl.textContent='☀️ Pas de pluie prévue';statusEl.style.color='#ffe600';}
    else if(maxIntensity===1){statusEl.textContent='🌦 Pluie faible prévue';statusEl.style.color='#88aaff';}
    else if(maxIntensity===2){statusEl.textContent='🌧 Pluie modérée prévue';statusEl.style.color='#4488ff';}
    else{statusEl.textContent='⛈ Pluie forte prévue';statusEl.style.color='#ff4422';}
  }
  /* Heure de mise à jour */
  const upEl=document.getElementById('rainNowUpdate');
  if(upEl&&data.update_time){
    const d=new Date(data.update_time*1000);
    upEl.textContent='MàJ '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  }
}

/* ── fetchRetry global ── */
async function fetchRetry(url,tries=3,delay=1200){
  for(let i=0;i<tries;i++){
    try{const r=await fetch(url);if(r.ok)return await r.json();}
    catch(e){if(i<tries-1)await new Promise(res=>setTimeout(res,delay*(i+1)));}
  }
  return null;
}

/* ── matrices ── */
function buildRainMx(omMain,metno,tIdx){
  const mx={},N=N_HRS,h=omMain.hourly;
  SOURCES.filter(s=>s.omModel).forEach(s=>{const k=`precipitation_${s.omModel}`;mx[s.key]=h[k]?[...h[k]]:null;});
  if(metno?.properties?.timeseries){
    const arr=new Array(N).fill(null);
    metno.properties.timeseries.forEach(e=>{const i=tIdx[localKey(e.time)]??-1;if(i>=0&&i<N){const v=e.data?.next_1_hours?.details?.precipitation_amount;if(v!=null)arr[i]=v;}});
    mx['metno']=arr;
  }else mx['metno']=null;
  return mx;
}
function buildProbMx(omMain,metno,tIdx){
  const mx={},N=N_HRS,h=omMain.hourly;
  SOURCES.filter(s=>s.omModel).forEach(s=>{const k=`precipitation_probability_${s.omModel}`;mx[s.key]=h[k]?[...h[k]]:null;});
  if(metno?.properties?.timeseries){
    const arr=new Array(N).fill(null);
    metno.properties.timeseries.forEach(e=>{const i=tIdx[localKey(e.time)]??-1;if(i>=0&&i<N){const v=e.data?.next_1_hours?.details?.probability_of_precipitation;if(v!=null)arr[i]=v;}});
    mx['metno']=arr;
  }else mx['metno']=null;
  return mx;
}
const synthR=(i,mx)=>p80(SOURCES.map(s=>mx[s.key]?.[i]));
const synthP=(i,mx)=>Math.min(100,maxOf(SOURCES.map(s=>mx[s.key]?.[i])));
const maxR=(i,mx)=>maxOf(SOURCES.map(s=>mx[s.key]?.[i]));

/* ── points ── */
function processData(omMain,omM15,rainMx,probMx){
  const pts=[],mods=SOURCES.map(()=>[]);
  const now=new Date(new Date().toLocaleString('en-US',{timeZone:cityTz}));
  const h=now.getHours(),m=now.getMinutes(),s=now.getSeconds();
  /* minutely_15 : AROME HD (mis à jour /h, 1.5km) + ICON D2 — MAX des deux */
  const m15_arome = omM15?.minutely_15?.precipitation_meteofrance_arome_france_hd ?? [];
  const m15_icon2 = omM15?.minutely_15?.precipitation_icon_d2 ?? [];
  const m15_best  = omM15?.minutely_15?.precipitation ?? [];
  const m15len = Math.max(m15_arome.length, m15_icon2.length, m15_best.length);
  const m15 = Array.from({length: m15len}, (_, i) => {
    const vals = [];
    if (m15_arome[i] != null && isFinite(m15_arome[i])) vals.push(m15_arome[i]);
    if (m15_icon2[i] != null && isFinite(m15_icon2[i])) vals.push(m15_icon2[i]);
    /* fallback best_match si hors zone AROME/ICON-D2 */
    if (!vals.length && m15_best[i] != null && isFinite(m15_best[i])) vals.push(m15_best[i]);
    return vals.length ? Math.max(...vals) : 0;
  });
  /* Fusionner m15 avec données MF si disponibles */
  const mfIntensToMmh=[0,0.3,1.5,5]; /* 0=sec,1=faible,2=modéré,3=fort */
  _mfByMin={}; /* reset global */
  if(_mfRainNow?.length){
    const t0=new Date(_mfRainNow[0].time);
    _mfRainNow.forEach(f=>{
      const tF=new Date(f.time);
      const diffMin=Math.round((tF-t0)/60000);
      _mfByMin[diffMin]=mfIntensToMmh[Math.min(f.rain_intensity??0,3)];
    });
  }

  const slotF=h*4+(m+s/60)/15;
  function push(t,d,idx){
    const r=idx>=0?synthR(idx,rainMx):0,mx=idx>=0?maxR(idx,rainMx):0,p=idx>=0?synthP(idx,probMx):0;
    pts.push({t,d,r,mx,p,hourIdx:idx});
    SOURCES.forEach((src,si)=>mods[si].push(idx>=0?(rainMx[src.key]?.[idx]??null):null));
  }
  /* Minutes restantes avant la prochaine heure (pas en vue étendue) */
  let minutesAdded=false;
  if(_viewMode!=='j8'&&_viewMode!=='j14'&&m15.length>0&&m>0){
    const minsToNextHour=60-m;
    for(let o=5;o<minsToNextHour;o+=5){
      const slotIdx=Math.min(Math.round(slotF+o/15),m15.length-1);
      const rM15=Math.max(0,m15[slotIdx]??0);
      /* MF : prendre la valeur au slot le plus proche en minutes */
      const mfKeys=Object.keys(_mfByMin).map(Number);
      const nearestMf=mfKeys.length?mfKeys.reduce((a,b)=>Math.abs(b-o)<Math.abs(a-o)?b:a,mfKeys[0]):null;
      const rMF=nearestMf!=null?_mfByMin[nearestMf]??0:0;
      /* MAX des deux sources */
      const r=Math.max(rM15,rMF);
      pts.push({t:`+${o}'`,d:0,r,mx:r,p:synthP(h,probMx),hourIdx:-1,mfIntens:_mfRainNow?._mfRainNow});
      SOURCES.forEach((_,si)=>mods[si].push(null));
      minutesAdded=true;
    }
  }
  /* Heures restantes aujourd'hui */
  for(let i=h+1;i<=23;i++) push(i+'h',0,i);
  /* Jours suivants selon la vue */
  if(_viewMode==='j0'){
    /* Aujourd'hui seulement — stop ici */
  } else if(_viewMode==='j1'){
    for(let hr=0;hr<24;hr++){const idx=24+hr;if(idx<N_HRS)push(hr+'h',1,idx);}
  } else if(_viewMode==='j8'||_viewMode==='j14'){
    for(let hr=0;hr<24;hr++){const idx=24+hr;if(idx<N_HRS)push(hr+'h',1,idx);}
    for(let d=2;d<=4;d++)for(let hr=0;hr<24;hr+=3){const idx=d*24+hr;if(idx<N_HRS)push(hr+'h',d,idx);}
    const maxD=_viewMode==='j14'?14:8;
    for(let d=5;d<=maxD;d++)for(let hr=0;hr<24;hr+=8){const idx=d*24+hr;if(idx<N_HRS)push(hr+'h',d,idx);}
  }
  render(pts,mods);
}

/* ── traitement J-N (générique J-1 et J-7) ── */
function processJmN(jmData,nDays){
  if(!jmData?.pastForecast?.hourly?.time){showStatus(`❌ Données J-${nDays} indisponibles`,'#ff3d57');return;}
  showStatus('','');
  const h=jmData.pastForecast.hourly;
  const omSources=SOURCES.filter(s=>s.omModel);
  const pts=[],mods=SOURCES.map(()=>[]);

  /* Collecter toutes les dates de la période */
  const startD=new Date(jmData.startDate+'T00:00');
  const endD=new Date(jmData.endDate+'T23:00');

  h.time.forEach((t,idx)=>{
    const tDate=new Date(t);
    if(tDate<startD||tDate>endD)return;
    const dayDiff=Math.round((tDate-startD)/(24*3600*1000));
    const hr=parseInt(t.slice(11,13));
    const rainVals=omSources.map(s=>{const k=`precipitation_${s.omModel}`;const v=h[k]?.[idx];return(v!=null&&isFinite(v)&&v>=0)?v:null;});
    const r=p80(rainVals),mx=maxOf(rainVals);
    const probVals=omSources.map(s=>{const k=`precipitation_probability_${s.omModel}`;const v=h[k]?.[idx];return(v!=null&&isFinite(v)&&v>=0)?v:null;});
    const prob=Math.min(100,maxOf(probVals));
    pts.push({t:hr+'h',d:dayDiff,r,mx,p:prob,hourIdx:idx});
    SOURCES.forEach(src=>{
      const k=`precipitation_${src.omModel}`;
      const v=src.omModel?h[k]?.[idx]:null;
      mods[SOURCES.indexOf(src)].push((v!=null&&isFinite(v))?v:null);
    });
  });

  if(!pts.length){showStatus(`❌ Aucune donnée J-${nDays}`,'#ff3d57');return;}

  /* Précipitations réelles */
  const realArr=new Array(pts.length).fill(null);
  if(jmData.realData?.hourly?.time){
    const tStart=new Date(jmData.startDate+'T00:00');
    jmData.realData.hourly.time.forEach((t,i)=>{
      const tD=new Date(t);if(tD<startD||tD>endD)return;
      const dayDiff2=Math.round((tD-tStart)/(24*3600*1000));
      const hr=parseInt(t.slice(11,13));
      const ptIdx=pts.findIndex(p=>p.d===dayDiff2&&parseInt(p.t)===hr);
      if(ptIdx>=0){const v=jmData.realData.hourly.precipitation?.[i];if(v!=null&&isFinite(v))realArr[ptIdx]=v;}
    });
  }
  renderJm1(pts,mods,realArr);
}

/* ── traitement J-1 ── */
function processJm1(jm1){
  if(!jm1?.pastForecast?.hourly?.time){
    showStatus('❌ Données J-1 indisponibles','#ff3d57');return;
  }
  showStatus('','');
  const h=jm1.pastForecast.hourly;
  const dateStr=jm1.dateStr;
  const omSources=SOURCES.filter(s=>s.omModel);
  const pts=[],mods=SOURCES.map(()=>[]);

  /* Parcourir les 24h d'hier dans la réponse */
  h.time.forEach((t,idx)=>{
    /* t est en heure locale grâce à timezone=auto */
    if(!t.startsWith(dateStr)) return;
    const hr=parseInt(t.slice(11,13));

    /* P80 sur les modèles OM uniquement */
    const rainVals=omSources.map(s=>{
      const k=`precipitation_${s.omModel}`;
      const v=h[k]?.[idx];
      return (v!=null&&isFinite(v)&&v>=0)?v:null;
    });
    const r=p80(rainVals);
    const mx=maxOf(rainVals);
    const probVals=omSources.map(s=>{
      const k=`precipitation_probability_${s.omModel}`;
      const v=h[k]?.[idx];
      return (v!=null&&isFinite(v)&&v>=0)?v:null;
    });
    const prob=Math.min(100,maxOf(probVals));

    pts.push({t:hr+'h',d:0,r,mx,p:prob,hourIdx:idx});

    /* mods : une entrée par source dans SOURCES (metno = null) */
    SOURCES.forEach(src=>{
      if(!src.omModel){mods[SOURCES.indexOf(src)].push(null);return;}
      const k=`precipitation_${src.omModel}`;
      const v=h[k]?.[idx];
      mods[SOURCES.indexOf(src)].push((v!=null&&isFinite(v))?v:null);
    });
  });

  if(!pts.length){showStatus('❌ Aucune donnée J-1 pour cette date','#ff3d57');return;}

  /* Précipitations réelles */
  const realArr=new Array(24).fill(null);
  if(jm1.realData?.hourly?.time){
    jm1.realData.hourly.time.forEach((t,i)=>{
      if(!t.startsWith(dateStr))return;
      const hr=parseInt(t.slice(11,13));
      const v=jm1.realData.hourly.precipitation?.[i];
      if(v!=null&&isFinite(v)) realArr[hr]=v;
    });
  }
  /* Aligner realArr sur pts */
  const realPts=pts.map(p=>{
    const hr=parseInt(p.t);
    return isNaN(hr)?null:realArr[hr];
  });

  renderJm1(pts,mods,realPts);
}

/* ── détection pics ── */
function detectPeaks(values,labels,threshold,minDist){
  threshold=threshold??0.15;minDist=minDist??4;
  const peaks=[];
  for(let i=1;i<values.length-1;i++){
    const v=values[i];if(v==null||v<threshold)continue;
    if(v>=(values[i-1]??0)&&v>=(values[i+1]??0)){
      if(!peaks.length||i-peaks[peaks.length-1].idx>=minDist)peaks.push({idx:i,val:v,label:labels[i]});
      else if(v>peaks[peaks.length-1].val)peaks[peaks.length-1]={idx:i,val:v,label:labels[i]};
    }
  }
  return peaks;
}

/* ── détection plages sèches (8h-20h, >2h, pluie<1mm ET proba<25%) ── */
function detectDrySlots(pts){
  const slots=[];
  function hourOf(p){if(p.t.includes("'"))return -1;const h=parseInt(p.t);return isNaN(h)?-1:h;}
  let runStart=-1;
  for(let i=0;i<pts.length;i++){
    const h=hourOf(pts[i]),inDay=h>=8&&h<=20,dry=inDay&&pts[i].mx<1&&pts[i].p<50;
    if(dry&&runStart<0)runStart=i;
    else if(!dry&&runStart>=0){if(i-runStart>2)slots.push({startIdx:runStart,endIdx:i-1});runStart=-1;}
  }
  if(runStart>=0&&pts.length-runStart>2)slots.push({startIdx:runStart,endIdx:pts.length-1});
  return slots;
}

/* ── roundRect ── */
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

/* ── badge encadré sur axe X ── */
function drawTickBadge(c,xPx,bottom,lbl,fSize,pad,borderCol,textCol){
  c.save();c.font=`900 ${fSize}px 'Courier New',monospace`;
  const tw=c.measureText(lbl).width,bw=tw+pad*2,bh=fSize+pad*2,bx=xPx-bw/2,by=bottom+4;
  c.fillStyle='#000';roundRect(c,bx-1,by-1,bw+2,bh+2,4);c.fill();
  c.strokeStyle=borderCol;c.lineWidth=1.2;roundRect(c,bx,by,bw,bh,3);c.stroke();
  c.fillStyle=textCol;c.textAlign='center';c.textBaseline='middle';c.fillText(lbl,xPx,by+bh/2);
  c.restore();
}

/* ── balle de tennis réaliste ── */
function drawTennisBall(c,cx,cy,r){
  c.save();

  /* Corps : jaune-vert clair avec lumière venue du centre-droit */
  const gBall=c.createRadialGradient(cx+r*0.2,cy-r*0.1,r*0.01,cx,cy,r);
  gBall.addColorStop(0,'#f0ff60');
  gBall.addColorStop(0.35,'#ddee20');
  gBall.addColorStop(0.75,'#c8d800');
  gBall.addColorStop(1,'#9aaa00');
  c.beginPath();c.arc(cx,cy,r,0,Math.PI*2);
  c.fillStyle=gBall;c.fill();

  /* Liseré 1 : haut-gauche, beige/crème, courbe convexe vers le bas */
  /* Sur la photo : part du bord supérieur gauche, descend en arc */
  c.save();
  c.beginPath();c.arc(cx,cy,r,0,Math.PI*2);c.clip(); /* clip dans la balle */
  const seam1_x=cx-r*0.42, seam1_y=cy-r*0.15;
  c.beginPath();
  c.arc(seam1_x, seam1_y, r*0.55, -Math.PI*0.35, Math.PI*0.45);
  const seamW=r*0.055;
  /* Double trait crème pour épaisseur */
  c.strokeStyle='rgba(230,220,170,0.95)';c.lineWidth=seamW*2.2;c.stroke();
  c.strokeStyle='rgba(255,255,240,0.6)';c.lineWidth=seamW*0.8;c.stroke();

  /* Liseré 2 : bas-droite, miroir du premier */
  const seam2_x=cx+r*0.42, seam2_y=cy+r*0.15;
  c.beginPath();
  c.arc(seam2_x, seam2_y, r*0.55, -Math.PI*1.35+Math.PI, Math.PI*0.45+Math.PI);
  c.strokeStyle='rgba(230,220,170,0.95)';c.lineWidth=seamW*2.2;c.stroke();
  c.strokeStyle='rgba(255,255,240,0.6)';c.lineWidth=seamW*0.8;c.stroke();
  c.restore();

  /* Ombre portée douce en bas */
  const gShad=c.createRadialGradient(cx,cy+r*0.85,r*0.1,cx,cy+r*0.9,r*0.7);
  gShad.addColorStop(0,'rgba(0,0,0,0.18)');
  gShad.addColorStop(1,'rgba(0,0,0,0)');
  c.beginPath();
  c.ellipse(cx,cy+r*0.95,r*0.7,r*0.18,0,0,Math.PI*2);
  c.fillStyle=gShad;c.fill();

  /* Reflet lumineux centre-droit */
  const gRef=c.createRadialGradient(cx+r*0.15,cy-r*0.05,0,cx+r*0.15,cy-r*0.05,r*0.65);
  gRef.addColorStop(0,'rgba(255,255,255,0.38)');
  gRef.addColorStop(0.5,'rgba(255,255,220,0.12)');
  gRef.addColorStop(1,'rgba(255,255,255,0)');
  c.beginPath();c.arc(cx,cy,r,0,Math.PI*2);
  c.fillStyle=gRef;c.fill();

  c.restore();
}

/* ── goutte de pluie 3D (logo sur les pics) ── */
function drawRainCloud(cv,cx,cy,r,mmh){
  cv.save();
  const drops=mmh<0.3?1:mmh<1?2:mmh<2?3:mmh<4?4:5;

  /* Disposition des gouttes */
  const positions=[];
  if(drops===1){ positions.push({x:cx,y:cy,s:1}); }
  else if(drops===2){ positions.push({x:cx-r*0.55,y:cy,s:0.85},{x:cx+r*0.55,y:cy,s:0.85}); }
  else if(drops===3){ positions.push({x:cx,y:cy-r*0.3,s:1},{x:cx-r*0.55,y:cy+r*0.4,s:0.8},{x:cx+r*0.55,y:cy+r*0.4,s:0.8}); }
  else if(drops===4){ positions.push({x:cx-r*0.55,y:cy-r*0.3,s:0.85},{x:cx+r*0.55,y:cy-r*0.3,s:0.85},{x:cx-r*0.55,y:cy+r*0.45,s:0.75},{x:cx+r*0.55,y:cy+r*0.45,s:0.75}); }
  else{ positions.push({x:cx,y:cy-r*0.4,s:0.9},{x:cx-r*0.6,y:cy+r*0.05,s:0.8},{x:cx+r*0.6,y:cy+r*0.05,s:0.8},{x:cx-r*0.35,y:cy+r*0.55,s:0.72},{x:cx+r*0.35,y:cy+r*0.55,s:0.72}); }

  function drawDrop(x,y,dr){
    /* Forme goutte : pointe en haut, ventre en bas */
    const h=dr*2.2, w=dr;
    cv.beginPath();
    cv.moveTo(x, y-h*0.5);           /* pointe */
    cv.bezierCurveTo(x+w*0.15,y-h*0.2, x+w,y+h*0.1, x+w,y+h*0.3);
    cv.arc(x,y+h*0.3,w,0,Math.PI);
    cv.bezierCurveTo(x-w,y+h*0.1, x-w*0.15,y-h*0.2, x,y-h*0.5);
    cv.closePath();

    /* Dégradé bleu foncé → bleu clair (gauche-haut → droite-bas) */
    const grd=cv.createLinearGradient(x-w,y-h*0.4,x+w*0.5,y+h*0.5);
    grd.addColorStop(0,'#1a3a6e');
    grd.addColorStop(0.35,'#2060b0');
    grd.addColorStop(0.65,'#4a90d8');
    grd.addColorStop(1,'#aad4f5');
    cv.fillStyle=grd;
    cv.shadowColor='rgba(0,100,200,0.5)';cv.shadowBlur=dr*0.5;
    cv.fill();cv.shadowBlur=0;

    /* Contour bleu moyen */
    cv.strokeStyle='rgba(40,100,180,0.7)';cv.lineWidth=dr*0.07;cv.stroke();

    /* Reflet blanc haut-gauche */
    cv.save();cv.beginPath();
    cv.moveTo(x, y-h*0.5);
    cv.bezierCurveTo(x+w*0.15,y-h*0.2,x+w,y+h*0.1,x+w,y+h*0.3);
    cv.arc(x,y+h*0.3,w,0,Math.PI);
    cv.bezierCurveTo(x-w,y+h*0.1,x-w*0.15,y-h*0.2,x,y-h*0.5);
    cv.clip();
    const gRef=cv.createRadialGradient(x-w*0.35,y-h*0.15,0,x-w*0.2,y,dr*1.2);
    gRef.addColorStop(0,'rgba(255,255,255,0.65)');
    gRef.addColorStop(0.4,'rgba(255,255,255,0.15)');
    gRef.addColorStop(1,'rgba(255,255,255,0)');
    cv.fillStyle=gRef;cv.fillRect(x-w*1.2,y-h*0.6,w*2.4,h*1.4);
    cv.restore();
  }

  /* Fond noir discret derrière le groupe */
  cv.beginPath();cv.arc(cx,cy,r*1.15,0,Math.PI*2);
  cv.fillStyle='rgba(0,0,0,0.55)';cv.fill();

  /* Dessiner chaque goutte */
  positions.forEach(p=>drawDrop(p.x,p.y,r*0.38*p.s));
  cv.restore();
}

/* ── icône météo canvas : soleil / nuage / pluie selon intensité ── */
function drawWeatherIcon(c,cx,cy,r,rainMm,prob){
  c.save();
  c.lineCap='round';c.lineJoin='round';
  if(rainMm<0.3&&prob<30){
    /* ── SOLEIL ── */
    const sr=r*0.42;
    c.beginPath();c.arc(cx,cy,sr,0,Math.PI*2);
    c.fillStyle='#ffe600';c.fill();
    c.strokeStyle='#ffe600';c.lineWidth=r*0.12;
    for(let i=0;i<8;i++){
      const a=i*Math.PI/4,r1=sr+r*0.18,r2=sr+r*0.38;
      c.beginPath();c.moveTo(cx+Math.cos(a)*r1,cy+Math.sin(a)*r1);
      c.lineTo(cx+Math.cos(a)*r2,cy+Math.sin(a)*r2);c.stroke();
    }
  } else {
    const cw=r*0.9,ch=r*0.45,cbx=cx-cw*0.1,cby=cy+r*0.05;
    c.beginPath();
    c.arc(cbx-cw*0.18,cby,ch*0.7,Math.PI,0);
    c.arc(cbx+cw*0.12,cby-ch*0.3,ch*0.95,Math.PI,0);
    c.arc(cbx+cw*0.42,cby,ch*0.6,Math.PI,0);
    c.lineTo(cbx+cw*0.42+ch*0.6,cby+ch*0.5);
    c.lineTo(cbx-cw*0.18-ch*0.7,cby+ch*0.5);
    c.closePath();
    const intensity=Math.min(rainMm/5,1);
    const gray=Math.round(180-intensity*130);
    c.fillStyle=`rgb(${gray},${gray},${gray+10})`;c.fill();
    c.strokeStyle='rgba(255,255,255,0.3)';c.lineWidth=r*0.07;c.stroke();
    if(rainMm>=0.3){
      const drops=rainMm<1?2:rainMm<3?3:4;
      const dropColor=rainMm<1?'rgba(120,180,255,0.7)':rainMm<3?'rgba(80,140,255,0.85)':'rgba(60,100,255,1)';
      c.strokeStyle=dropColor;c.lineWidth=r*0.12;
      const dropLen=r*(0.2+Math.min(rainMm/4,0.25));
      for(let i=0;i<drops;i++){
        const dx=cx-cw*0.3+i*(cw*0.55/(drops-1||1));
        const dy0=cby+ch*0.6+r*0.1;
        c.beginPath();c.moveTo(dx,dy0);c.lineTo(dx-r*0.08,dy0+dropLen);c.stroke();
      }
    }
  }
  c.restore();
}

    },

      {id:'overlay',afterDraw(chart){if(chart.width!==lastW){lastW=chart.width;buildOverlays(chart,pts);}else{updateOverlayPositions(chart,pts);}}},
      {id:'drySlots',afterDatasetsDraw(chart){
        if(!_drySlots.length)return;
        const {ctx:c,scales:{x},chartArea:{top,bottom}}=chart;
        const step=Math.abs(x.getPixelForValue(1)-x.getPixelForValue(0))/2;
        _drySlots.forEach(sl=>{
          const x0=x.getPixelForValue(sl.startIdx)-step;
          const x1=x.getPixelForValue(sl.endIdx)+step;
          if(x1<x.left||x0>x.right)return;
          const cx0=Math.max(x0,x.left),cx1=Math.min(x1,x.right);
          const midX=(cx0+cx1)/2,slotW=cx1-cx0;
          c.save();
          c.fillStyle='rgba(255,230,0,0.09)';
          c.fillRect(cx0,top,slotW,bottom-top);
          c.strokeStyle='rgba(255,230,0,0.3)';c.lineWidth=1;c.setLineDash([3,3]);
          c.beginPath();c.moveTo(cx0,top);c.lineTo(cx0,bottom);c.stroke();
          c.beginPath();c.moveTo(cx1,top);c.lineTo(cx1,bottom);c.stroke();
          c.setLineDash([]);
          /* logo tennis */
          const ballR=isMob?9:13;
          const bcy=top+ballR+6;
          c.save();c.beginPath();c.rect(cx0,top,slotW,bottom-top);c.clip();
          drawTennisBall(c,midX,bcy,ballR);
          c.restore();
          /* heures début→fin */
          const fSize=isMob?10:12;
          const startLbl=pts[sl.startIdx].t,endLbl=pts[sl.endIdx].t;
          c.font=`900 ${fSize}px 'Courier New',monospace`;
          const timeStr=startLbl+'→'+endLbl;
          const textY=bcy+ballR*1.85+4;
          const needed=c.measureText(timeStr).width+4;
          c.fillStyle='rgba(255,230,0,0.85)';
          if(slotW>=needed){c.textAlign='center';c.textBaseline='top';c.fillText(timeStr,midX,textY);}
          else{
            const needHalf=c.measureText(startLbl).width+2;
            if(slotW/2>=needHalf){c.textBaseline='top';c.textAlign='left';c.fillText(startLbl,cx0+3,textY);c.textAlign='right';c.fillText(endLbl,cx1-3,textY);}
          }
          c.restore();
        });
      }},
      /* ── Dégradé coloré sous courbe P80 — suit le tracé exact ── */
      {id:'colorFill',afterDatasetsDraw(chart){
        const {ctx:cv,scales:{x,y},chartArea:{top,bottom}}=chart;
        const p80data=pts.map(p=>p.r);
        /* Index du dataset P80 = 1(fill)+nSrc(modèles)+1(MAX)+1(P80) = nSrc+2 */
        const nSrc=SOURCES.length;
        const p80ds=chart.data.datasets[nSrc+2];
        const meta=chart.getDatasetMeta(nSrc+2);
        if(!meta?.data?.length)return;

        function rainColor(mm){
          if(mm<=0)     return null;
          if(mm<0.1)    return 'rgba(180,255,180,0.06)';  /* bruine : quasi invisible */
          if(mm<0.3)    return 'rgba(120,230,140,0.10)';  /* très légère */
          if(mm<0.5)    return 'rgba(60,200,110,0.18)';   /* légère */
          if(mm<1)      return 'rgba(50,200,255,0.28)';   /* modérée faible */
          if(mm<2)      return 'rgba(50,150,255,0.38)';   /* modérée */
          if(mm<3)      return 'rgba(30,80,255,0.48)';    /* modérée-forte */
          if(mm<4)      return 'rgba(80,50,220,0.55)';    /* forte */
          if(mm<5)      return 'rgba(140,30,200,0.62)';   /* très forte */
          return         'rgba(200,20,80,0.72)';           /* déluge 5+ */
        }

        cv.save();
        cv.beginPath();cv.rect(x.left,top,x.right-x.left,bottom-top);cv.clip();

        /* Dessiner segment par segment entre chaque paire de points consécutifs
           en utilisant les coordonnées pixel RÉELLES du dataset Chart.js */
        for(let i=0;i<meta.data.length-1;i++){
          const mm=p80data[i]??0;
          const col=rainColor(mm);
          if(!col)continue;
          const ptA=meta.data[i];
          const ptB=meta.data[i+1];
          if(!ptA||!ptB)continue;
          const ax=ptA.x, ay=ptA.y;
          const bx=ptB.x, by=ptB.y;
          /* Tracer le trapèze : courbe en haut, ligne droite en bas */
          cv.beginPath();
          cv.moveTo(ax,bottom);
          cv.lineTo(ax,ay);
          /* Utiliser les control points de Bézier du dataset pour suivre la courbe */
          if(ptA.cp2x!==undefined&&ptB.cp1x!==undefined){
            cv.bezierCurveTo(ptA.cp2x,ptA.cp2y,ptB.cp1x,ptB.cp1y,bx,by);
          } else {
            cv.lineTo(bx,by);
          }
          cv.lineTo(bx,bottom);
          cv.closePath();
          cv.fillStyle=col;
          cv.fill();
        }
        cv.restore();
      }},

      {id:'bike8h',afterDraw(chart){
        if(!_8hXPos.length)return;
        const {ctx:c,chartArea:{top}}=chart;
        const r=isMob?11:15;
        _8hXPos.forEach(({xPx,day})=>{
          const around8h=pts.filter(p=>{if(p.d!==day)return false;const h=parseInt(p.t);return !isNaN(h)&&h>=7&&h<=10;});
          const at8h=pts.find(p=>p.d===day&&p.t==='8h');
          const ref=around8h.length?around8h:at8h?[at8h]:[];
          const rainVal=ref.length?ref.reduce((s,p)=>s+p.r,0)/ref.length:0;
          const probVal=ref.length?ref.reduce((s,p)=>s+p.p,0)/ref.length:0;
          c.save();c.beginPath();c.arc(xPx,top+r+6,r+3,0,Math.PI*2);
          c.fillStyle='rgba(0,0,0,0.7)';c.fill();c.restore();
          drawWeatherIcon(c,xPx,top+r+6,r,rainVal,probVal);
        });
      }},
      {id:'windAlert',afterDatasetsDraw(chart){
        if(!_windData)return;
        const {ctx:cv,scales:{x},chartArea:{top,bottom}}=chart;
        const fSize=isMob?8:9;
        pts.forEach((p,i)=>{
          if(p.hourIdx<0||p.hourIdx>=_windData.length)return;
          const wind=_windData[p.hourIdx];
          if(wind==null||wind<50)return;
          const xPx=x.getPixelForValue(i);
          if(xPx<x.left||xPx>x.right)return;
          cv.save();
          cv.font=`${isMob?11:14}px serif`;cv.textAlign='center';cv.textBaseline='top';cv.globalAlpha=0.8;
          cv.fillText('\u{1F4A8}',xPx,top+2);
          cv.font=`900 ${fSize}px 'Courier New',monospace`;cv.fillStyle='rgba(100,200,255,0.9)';
          cv.textBaseline='top';cv.fillText(Math.round(wind)+'km/h',xPx,top+(isMob?14:18));
          cv.globalAlpha=1;cv.restore();
        });
      }},
      /* ── Mini widget MF pluie dans l'heure — barres colorées visibles ── */
      {id:'mfRainWidget',afterDraw(chart){
        if(!_mfRainNow?.length)return;
        const {ctx:cv,scales:{x},chartArea:{top,bottom}}=chart;
        const minuteIdxs=pts.map((p,i)=>p.t.includes("'")?i:-1).filter(i=>i>=0);
        if(!minuteIdxs.length)return;
        const firstIdx=minuteIdxs[0];
        const lastIdx=minuteIdxs[minuteIdxs.length-1];
        const x0=x.getPixelForValue(firstIdx);
        const x1=x.getPixelForValue(lastIdx);
        if(x1<x.left||x0>x.right)return;
        const cx0=Math.max(x0,x.left), cx1=Math.min(x1,x.right);
        /* Hauteur et position : DANS la zone graphe, juste au-dessus du bas */
        const H=isMob?16:22;
        const barY=bottom-H-2; /* au-dessus des ticks mais dans chartArea */
        /* Fond semi-transparent derrière le widget */
        cv.save();
        cv.fillStyle='rgba(0,0,30,0.92)';
        cv.fillRect(cx0,barY-1,cx1-cx0,H+2);
        /* Couleurs vives sur fond sombre */
        const colors=['#0a0a1a','#00ccff','#0044ff','#ff2200'];
        minuteIdxs.forEach((gi,mi)=>{
          const xPx=x.getPixelForValue(gi);
          if(xPx<x.left||xPx>x.right)return;
          const nextPx=x.getPixelForValue(gi+1);
          const slotW=Math.max(2,Math.abs(nextPx-xPx)-1);
          const o=parseInt(pts[gi].t); /* "+5'" → 5 */
          const mfKeys=Object.keys(_mfByMin).map(Number);
          let intens=0;
          if(mfKeys.length){
            const nk=mfKeys.reduce((a,b)=>Math.abs(b-o)<Math.abs(a-o)?b:a,mfKeys[0]);
            const v=_mfByMin[nk]??0;
            intens=v>=5?3:v>=1.5?2:v>0?1:0;
          }
          cv.fillStyle=colors[intens];
          cv.fillRect(xPx,barY,slotW,H);
          /* Glow sur les barres colorées */
          if(intens>0){
            cv.shadowColor=colors[intens];
            cv.shadowBlur=4;
            cv.fillRect(xPx,barY,slotW,H);
            cv.shadowBlur=0;
          }
        });
        /* Bordure fine */
        cv.strokeStyle='rgba(100,180,255,0.5)';
        cv.lineWidth=1;
        cv.strokeRect(cx0,barY-1,cx1-cx0,H+2);
        /* Label "MF" */
        const fs=isMob?7:8;
        cv.font=`900 ${fs}px 'Courier New',monospace`;
        cv.fillStyle='rgba(100,180,255,0.9)';
        cv.textAlign='left';cv.textBaseline='middle';
        cv.fillText('MF',cx0+2,barY+H/2);
        cv.restore();
      }},

      {id:'peakLines',afterDatasetsDraw(chart){
        if(!_peaks.length)return;
        const {ctx:c,scales:{x,y},chartArea:{top,bottom}}=chart;
        _peaks.forEach(pk=>{
          const xPx=x.getPixelForValue(pk.idx),yPx=y.getPixelForValue(pk.val);
          if(xPx<x.left||xPx>x.right)return;
          c.save();
          c.strokeStyle='rgba(255,230,0,0.5)';c.lineWidth=1;c.setLineDash([3,3]);
          c.beginPath();c.moveTo(xPx,top);c.lineTo(xPx,bottom);c.stroke();
          c.setLineDash([]);
          /* Nuage de pluie sur le pic */
          const cloudR=isMob?11:15;
          drawRainCloud(c,xPx,yPx-cloudR*1.3,cloudR,pk.val);
          c.restore();
        });
      }},
      {id:'axisLabels',afterDraw(chart){
        const {ctx:c,scales:{x},chartArea:{bottom}}=chart;
        const fSize=isMob?8:10,pad=4;
        _peaks.forEach(pk=>{
          const xPx=x.getPixelForValue(pk.idx);
          if(xPx<x.left||xPx>x.right)return;
          drawTickBadge(c,xPx,bottom,pk.label,fSize,pad,'rgba(255,230,0,0.9)','#ffe600');
        });
        _rainStarts.forEach(rs=>{
          const xPx=x.getPixelForValue(rs.idx);
          if(xPx<x.left||xPx>x.right)return;
          const overlap=_peaks.some(pk=>Math.abs(x.getPixelForValue(pk.idx)-xPx)<6);
          if(!overlap)drawTickBadge(c,xPx,bottom,rs.label,fSize,pad,'rgba(0,255,255,0.9)','#00ffff');
        });
      }}
    ]
  });
  setTimeout(()=>{applyComplexity();if(zoomMin>0||zoomMax<1){const n=myChart?.data?.labels?.length||1;myChart.options.scales.x.min=Math.round(zoomMin*n);myChart.options.scales.x.max=Math.round(zoomMax*n)-1;myChart.update('none');updateScrollbar();}},0);
}

/* ── overlays CSS ── */
function buildOverlays(chart,pts){
  const {chartArea,scales:{x},width:cW}=chart;
  const wrapper=document.getElementById('chartWrapper');
  wrapper.querySelectorAll('.sep-line').forEach(e=>e.remove());
  const dfi={};pts.forEach((p,i)=>{if(dfi[p.d]===undefined)dfi[p.d]=i;});
  const days=Object.keys(dfi).map(Number).sort((a,b)=>a-b);
  const wH=wrapper.offsetHeight;
  const xp={};days.forEach(d=>{xp[d]=x.getPixelForValue(dfi[d]);});
  function addLine(xPx,graphOnly){
    const l=document.createElement('div');l.className='sep-line';
    const h=graphOnly?(chartArea.bottom-chartArea.top):(wH-chartArea.top);
    l.style.cssText=`left:${xPx}px;top:${chartArea.top}px;height:${h}px;`;
    wrapper.appendChild(l);
  }
  days.slice(1).forEach(d=>addLine(xp[d],false));
  _8hXPos=[];
  [[_idx8hJ0,0],[_idx8hJ1,1]].forEach(([idx,day])=>{
    if(idx<0)return;
    const xPx=x.getPixelForValue(idx);
    if(xPx>chartArea.left&&xPx<chartArea.right){addLine(xPx,true);_8hXPos.push({xPx,day});}
  });
  buildSummary(chart,pts,days,xp);
}

/* ── résumé par jour ── */
function buildSummary(chart,pts,days,xp){
  const {chartArea,scales:{x},width:cW}=chart;
  const row=document.getElementById('summaryRow');
  const dn=['DIM','LUN','MAR','MER','JEU','VEN','SAM'];
  const cn=new Date(new Date().toLocaleString('en-US',{timeZone:cityTz}));
  row.style.paddingLeft=chartArea.left+'px';
  row.style.paddingRight=(cW-chartArea.right)+'px';
  row.innerHTML='';
  const isMultiline=days.length>2;
  row.className=isMultiline?'multiline':'singleline';
  const visLeft=chartArea.left,visRight=chartArea.right;
  const xpClamped={};days.forEach(d=>{xpClamped[d]=Math.max(visLeft,Math.min(visRight,xp[d]));});
  const lastXPx=visRight;
  const starts=days.map((d,di)=>di===0?visLeft:xpClamped[d]);
  const ends=days.map((d,di)=>di===days.length-1?lastXPx:xpClamped[days[di+1]]);
  const innerW=days.slice(0,-1).map((_,di)=>Math.max(0,ends[di]-starts[di]));
  const stdW=innerW.length?innerW.reduce((a,b)=>a+b,0)/innerW.length:60;
  days.forEach((d,di)=>{
    const date=new Date(cn);date.setDate(cn.getDate()+d);
    const isLast=di===days.length-1;
    const rawW=Math.max(0,ends[di]-starts[di]);
    const w=isLast?Math.max(rawW,stdW):rawW;
    const dd=pts.filter(p=>p.d===d);
    const total=dd.reduce((s,p)=>s+p.mx,0);
    const maxP=Math.max(...dd.map(p=>p.p),0);
    const lbl=d===0?'AUJ.':dn[date.getDay()];
    const tMax=d===0?_tempJ0Max:d===1?_tempJ1Max:null;
    const tMin=d===0?_tempJ0Min:d===1?_tempJ1Min:null;
    const tempInline=tMax!==null?`<span class="temp-min">${Math.round(tMin??0)}°</span><span class="temp-max">/${Math.round(tMax)}°</span>`:'';
    const div=document.createElement('div');
    div.className='day-seg'+(isLast&&days.length>2?' last':'');div.style.width=w+'px';
    div.innerHTML=`<span class="day-name">${lbl}</span><span class="day-rain">${total.toFixed(1)}<span class="unit">mm</span></span><span class="day-prob">${Math.round(maxP)}%</span>${tempInline}`;
    row.appendChild(div);
  });
}

function initRadar(lat,lon){
  _cityLat=lat;_cityLon=lon;
  if(!_radarMap){
    _radarMap=L.map('radarMap',{center:[lat,lon],zoom:6,minZoom:3,maxZoom:7,zoomControl:true,attributionControl:false});
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:7,tileSize:256}).addTo(_radarMap);
    _radarMarker=L.circleMarker([lat,lon],{radius:6,color:'#ffe600',weight:2,fillColor:'#ffe600',fillOpacity:0.9}).addTo(_radarMap);
    _radarMap.on('click',e=>reverseGeocode(e.latlng.lat,e.latlng.lng));
  } else {
    _radarMap.setView([lat,lon],6);
    if(_radarMarker)_radarMarker.setLatLng([lat,lon]);
  }
  setTimeout(()=>{_radarMap.invalidateSize();loadRadarFrames();},100);
}

async function loadRadarFrames(){
  try{
    const data=await fetchRetry('https://api.rainviewer.com/public/weather-maps.json');
    if(!data?.radar?.past)return;
    _radarFrames=[...data.radar.past,...(data.radar.nowcast||[])];
    _radarIdx=_radarFrames.length-1;
    showRadarFrame(_radarIdx);
  }catch(e){console.error('Radar error',e);}
}

function showRadarFrame(idx){
  if(!_radarFrames.length||!_radarMap)return;
  idx=Math.max(0,Math.min(idx,_radarFrames.length-1));
  _radarIdx=idx;
  const frame=_radarFrames[idx];
  if(_radarLayer){_radarMap.removeLayer(_radarLayer);}
  _radarLayer=L.tileLayer(
    `https://tilecache.rainviewer.com${frame.path}/256/{z}/{x}/{y}/2/1_1.png`,
    {opacity:0.85,maxZoom:7,tileSize:256,noWrap:false}
  ).addTo(_radarMap);
  const d=new Date(frame.time*1000);
  const hh=String(d.getHours()).padStart(2,'0'),mm=String(d.getMinutes()).padStart(2,'0');
  document.getElementById('radarTime').textContent=(frame.nowcast?'🔮 ':'')+hh+':'+mm;
}

function toggleRadarPlay(){
  _radarPlaying=!_radarPlaying;
  const btn=document.getElementById('radarPlayBtn');
  btn.textContent=_radarPlaying?'⏹ STOP':'▶ PLAY';
  btn.classList.toggle('playing',_radarPlaying);
  if(_radarPlaying){
    _radarTimer=setInterval(()=>{_radarIdx=(_radarIdx+1)%_radarFrames.length;showRadarFrame(_radarIdx);},600);
  } else {
    clearInterval(_radarTimer);
    const lastReal=_radarFrames.reduce((best,f,i)=>(!f.nowcast?i:best),0);
    showRadarFrame(lastReal);
  }
}

async function reverseGeocode(lat,lng){
  try{
    const nom=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat.toFixed(5)}&lon=${lng.toFixed(5)}&format=json&accept-language=fr`).then(r=>r.json());
    if(nom?.address){
      const city=nom.address.city||nom.address.town||nom.address.village||nom.address.municipality||nom.display_name.split(',')[0];
      document.getElementById('cityInput').value=city;
      document.getElementById('clearBtn').style.display='block';
      load();
    }
  }catch(e){console.error('Reverse geocode error',e);}
}

let sbDragging=false,sbStartX=0,sbStartMin=0; /* scrollbar drag global */

/* ── Scrollbar ── */
function updateScrollbar(){
  const wrap=document.getElementById('scrollbarWrap');
  const track=document.getElementById('scrollbarTrack');
  const thumb=document.getElementById('scrollbarThumb');
  if(!wrap||!track||!thumb)return;
  const zoomed=(zoomMax-zoomMin)<0.999;
  wrap.style.display=zoomed?'block':'none';
  if(!zoomed)return;
  const tw=track.offsetWidth;
  const thumbW=Math.max(24,tw*(zoomMax-zoomMin));
  const thumbLeft=tw*zoomMin;
  thumb.style.width=thumbW+'px';
  thumb.style.left=Math.min(tw-thumbW,thumbLeft)+'px';
}

function initScrollbar(){
  const track=document.getElementById('scrollbarTrack');
  const thumb=document.getElementById('scrollbarThumb');
  if(!track||!thumb)return;

  /* ── Drag thumb ── */
  function startSbDrag(clientX){sbDragging=true;sbStartX=clientX;sbStartMin=zoomMin;thumb.classList.add('dragging');}
  function moveSbDrag(clientX){
    if(!sbDragging)return;
    const tw=track.getBoundingClientRect().width;
    const dx=(clientX-sbStartX)/tw;
    const range=zoomMax-zoomMin;
    let lo=sbStartMin+dx,hi=lo+range;
    if(lo<0){hi-=lo;lo=0;}if(hi>1){lo-=hi-1;hi=1;}
    zoomMin=Math.max(0,lo);zoomMax=Math.min(1,hi);applyZoom();
  }
  function endSbDrag(){if(sbDragging){sbDragging=false;thumb.classList.remove('dragging');}}

  thumb.addEventListener('mousedown',e=>{startSbDrag(e.clientX);e.preventDefault();e.stopPropagation();});
  thumb.addEventListener('touchstart',e=>{startSbDrag(e.touches[0].clientX);e.preventDefault();},{passive:false});

  /* Clic direct sur track (hors thumb) */
  track.addEventListener('click',e=>{
    if(e.target===thumb)return;
    const rect=track.getBoundingClientRect();
    const cx=(e.clientX-rect.left)/rect.width;
    const half=(zoomMax-zoomMin)/2;
    let lo=cx-half,hi=cx+half;
    if(lo<0){hi-=lo;lo=0;}if(hi>1){lo-=hi-1;hi=1;}
    zoomMin=Math.max(0,lo);zoomMax=Math.min(1,hi);applyZoom();
  });

  document.addEventListener('mousemove',e=>{moveSbDrag(e.clientX);});
  document.addEventListener('mouseup',()=>endSbDrag());
  document.addEventListener('touchmove',e=>{if(sbDragging){moveSbDrag(e.touches[0].clientX);e.preventDefault();}},{passive:false});
  document.addEventListener('touchend',()=>endSbDrag());

  /* ── Pan souris sur le graphique (hold + drag) ── */
  let chartPanning=false,chartPanStartX=0,chartPanStartRange=null;
  const wrapper=document.getElementById('chartWrapper');
  if(wrapper){
    wrapper.style.cursor='grab';
    wrapper.addEventListener('mousedown',e=>{
      if(e.target.closest('#scrollbarWrap'))return;
      chartPanning=true;chartPanStartX=e.clientX;chartPanStartRange=[zoomMin,zoomMax];
      wrapper.style.cursor='grabbing';e.preventDefault();
    });
    document.addEventListener('mousemove',e=>{
      if(!chartPanning||!chartPanStartRange)return;
      const ww=wrapper.offsetWidth||300;
      const range=chartPanStartRange[1]-chartPanStartRange[0];
      const shift=(e.clientX-chartPanStartX)/ww*range*-1;
      let lo=chartPanStartRange[0]+shift,hi=chartPanStartRange[1]+shift;
      if(lo<0){hi-=lo;lo=0;}if(hi>1){lo-=hi-1;hi=1;}
      zoomMin=Math.max(0,lo);zoomMax=Math.min(1,hi);applyZoom();
    });
    document.addEventListener('mouseup',()=>{if(chartPanning){chartPanning=false;wrapper.style.cursor='grab';}});
  }
}

/* ── Zoom tactile + molette ── */
(function(){
  const wrapper=()=>document.getElementById('chartWrapper');
  let startDist=0,startRange=null,startPan=null,startX=0;

  function getTouches(e){return Array.from(e.touches);}
  function dist(a,b){return Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);}

  document.addEventListener('touchstart',e=>{
    if(!wrapper()||!wrapper().contains(e.target))return;
    const t=getTouches(e);
    if(t.length===2){e.preventDefault();startDist=dist(t[0],t[1]);startRange=[zoomMin,zoomMax];}
    else if(t.length===1){startPan=[zoomMin,zoomMax];startX=t[0].clientX;}
  },{passive:false});

  document.addEventListener('touchmove',e=>{
    if(!wrapper()||!wrapper().contains(e.target))return;
    const t=getTouches(e);
    if(t.length===2&&startRange){
      e.preventDefault();
      const d=dist(t[0],t[1]);const scale=startDist/d;
      const [lo,hi]=startRange;const center=(lo+hi)/2;const half=(hi-lo)*scale/2;
      zoomMin=Math.max(0,center-half);zoomMax=Math.min(1,center+half);
      if(zoomMax-zoomMin<0.05){const c2=(zoomMin+zoomMax)/2;zoomMin=c2-0.025;zoomMax=c2+0.025;}
      applyZoom();
    } else if(t.length===1&&startPan){
      e.preventDefault();
      const dx=t[0].clientX-startX;const ww=wrapper().offsetWidth||300;
      const shift=(dx/ww)*(startPan[1]-startPan[0])*-1;
      let lo=startPan[0]+shift,hi=startPan[1]+shift;
      if(lo<0){hi-=lo;lo=0;}if(hi>1){lo-=hi-1;hi=1;}
      zoomMin=Math.max(0,lo);zoomMax=Math.min(1,hi);applyZoom();
    }
  },{passive:false});

  document.addEventListener('touchend',e=>{
    if(getTouches(e).length<2){startDist=0;startRange=null;}
    if(getTouches(e).length<1){startPan=null;}
  });

  document.addEventListener('wheel',e=>{
    if(!wrapper()||!wrapper().contains(e.target))return;
    e.preventDefault();
    const rect=wrapper().getBoundingClientRect();
    const cx=(e.clientX-rect.left)/rect.width;
    const range=zoomMax-zoomMin;const factor=e.deltaY>0?1.15:0.87;
    const newRange=Math.min(1,range*factor);
    let lo=zoomMin+(cx*range)-(cx*newRange);let hi=lo+newRange;
    if(lo<0){hi-=lo;lo=0;}if(hi>1){lo-=hi-1;hi=1;}
    zoomMin=Math.max(0,lo);zoomMax=Math.min(1,hi);
    if(zoomMax-zoomMin<0.04){const mid=(zoomMin+zoomMax)/2;zoomMin=mid-0.02;zoomMax=mid+0.02;}
    applyZoom();
  },{passive:false});

  let lastTap=0;
  document.addEventListener('touchend',e=>{
    if(!wrapper()||!wrapper().contains(e.target))return;
    const now=Date.now();
    if(now-lastTap<300){zoomMin=0;zoomMax=1;if(myChart){delete myChart.options.scales.x.min;delete myChart.options.scales.x.max;myChart.update('none');updateScrollbar();}}
    lastTap=now;
  });

  document.addEventListener('dblclick',e=>{
    if(!wrapper()||!wrapper().contains(e.target))return;
    zoomMin=0;zoomMax=1;
    if(myChart){delete myChart.options.scales.x.min;delete myChart.options.scales.x.max;myChart.update('none');updateScrollbar();}
  });

  initScrollbar();
})();

    if(_viewMode==='jm1')return;
    const {omMain,omM15,rainMx,probMx}=_cachedData;
    lastW=0;processData(omMain,omM15,rainMx,probMx);
  },5*60*1000);
  setInterval(()=>{if(_cachedData)load();},30*60*1000);
}

let rt;
window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(()=>{lastW=0;if(myChart)myChart.update();},250);});

/* ── Paramètre URL ?ville=xxx &j=8 ── */
(function(){
  const params=new URLSearchParams(window.location.search);
  const villeParam=params.get('ville');
  if(villeParam){
    document.getElementById('cityInput').value=villeParam;
    document.getElementById('clearBtn').style.display='block';
  }
  const jParam=params.get('j');
  if(jParam==='8'||jParam==='+8') window._autoSelectView='j8';
  else if(jParam==='-1'||jParam==='m1') window._autoSelectView='jm1';
})();

load().then(()=>{startAutoRefresh();if(window._autoSelectView){setView(window._autoSelectView);}}).catch(()=>startAutoRefresh());
</script>
