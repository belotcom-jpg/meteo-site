<head>
<meta charset="UTF-8">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#000;color:#fff;font-family:'Courier New',monospace;padding:6px;min-height:100dvh;overflow-x:hidden}
.wrap{max-width:1400px;margin:0 auto;display:flex;flex-direction:column;gap:3px}
.search{position:relative}
#clearBtn{position:absolute;right:70px;top:50%;transform:translateY(-50%);background:none;border:none;color:#555;font-size:16px;cursor:pointer;padding:4px 6px;line-height:1;display:none}
#clearBtn:hover{color:#fff}
.search{display:flex;gap:8px}
input{flex:1;min-width:0;background:#0d0d0d;border:2px solid #555;border-radius:10px;padding:9px 12px;color:#fff;font-size:clamp(13px,3.5vw,16px);font-weight:900;font-family:'Courier New',monospace;outline:none;-webkit-appearance:none}
input:focus{border-color:#00ffff;box-shadow:0 0 10px rgba(0,255,255,.3)}
#searchBtn{background:#00ffff;color:#000;border:none;padding:0 14px;border-radius:10px;font-weight:900;cursor:pointer;flex-shrink:0;font-family:'Courier New',monospace;font-size:clamp(11px,3vw,14px);min-height:40px;min-width:46px;-webkit-appearance:none;transition:background .15s}
#searchBtn:active{background:#fff}
#searchBtn:disabled{background:#333;color:#666}
#sourcesBar{display:none;background:#080808;border:1px solid #1e1e1e;border-radius:6px;padding:3px 8px;flex-wrap:wrap;gap:4px;align-items:center}
.src-lbl{font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:2px;color:#444;flex-shrink:0}
.src-badge{display:flex;align-items:center;gap:3px;font-size:8px;font-weight:900;padding:1px 5px;border-radius:4px;border:1px solid #222;color:#444;transition:all .3s}
.src-badge.ok{color:#eee}
.src-badge.err{border-color:#ff3d5766;color:#ff3d57}
.src-dot{width:6px;height:6px;border-radius:50%;background:#222;transition:all .3s;flex-shrink:0}
.src-badge.loading .src-dot{animation:pulse .8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#viewBtns{display:none;gap:6px;justify-content:flex-end;align-items:center}
#radarCard{background:#080808;border:2px solid #333;border-radius:16px;overflow:hidden}
#radarHeader{display:flex;justify-content:space-between;align-items:center;padding:7px 12px;border-bottom:1px solid #2a2a2a}
#radarTitle{font-size:10px;font-weight:900;color:#888;letter-spacing:2px}
#radarTime{font-size:9px;color:#555;font-weight:700}
#radarMap{height:clamp(220px,50vw,360px);width:100%;position:relative}
#radarMap .leaflet-container{background:#111}
.radar-crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:16px;height:16px;pointer-events:none;z-index:1000}
.radar-crosshair::before,.radar-crosshair::after{content:'';position:absolute;background:rgba(255,230,0,0.8)}
.radar-crosshair::before{width:1px;height:100%;left:50%;top:0}
.radar-crosshair::after{width:100%;height:1px;top:50%;left:0}
#radarPlayBtn{background:#0d0d0d;border:1.5px solid #333;border-radius:6px;color:#888;font-family:'Courier New',monospace;font-size:9px;font-weight:900;padding:3px 8px;cursor:pointer;transition:all .15s}
#radarPlayBtn.playing{border-color:#00ffff;color:#00ffff}
#modeToggle{background:#0d0d0d;border:1.5px solid #444;border-radius:7px;color:#888;font-family:'Courier New',monospace;font-size:9px;font-weight:900;padding:4px 10px;cursor:pointer;letter-spacing:1px;transition:all .15s;white-space:nowrap}
#modeToggle.simple{border-color:#ffe600;color:#ffe600;background:rgba(255,230,0,0.07)}
.view-btn{background:#0d0d0d;border:1.5px solid #333;border-radius:7px;color:#888;font-family:'Courier New',monospace;font-size:9px;font-weight:900;padding:4px 10px;cursor:pointer;letter-spacing:1px;transition:all .15s;white-space:nowrap}
.view-btn:hover{border-color:#888;color:#fff}
.view-btn.active{border-color:#00ffff;color:#00ffff;background:rgba(0,255,255,.07)}
.card{background:#080808;border:2px solid #333;border-radius:16px;overflow:hidden;display:flex;flex-direction:column}
.header{display:flex;justify-content:space-between;align-items:center;padding:5px 10px;border-bottom:1px solid #2a2a2a;gap:8px}
.header-left{display:flex;flex-direction:column;gap:2px;min-width:0}
.city-tz{font-size:clamp(9px,2vw,11px);color:#ddd;letter-spacing:1px;font-weight:700}
.legend{display:flex;flex-direction:column;gap:3px;align-items:flex-end;flex-shrink:0}
.leg{display:flex;align-items:center;gap:5px}
.leg-dot{width:20px;height:3px;border-radius:2px;flex-shrink:0}
.leg-dot.dashed{background:repeating-linear-gradient(90deg,#ffe600 0,#ffe600 6px,transparent 6px,transparent 10px);height:2px}
.leg-txt{font-size:clamp(9px,2.5vw,10px);font-weight:900}.p80-info{position:relative}.p80-tooltip{display:none;position:absolute;right:0;top:18px;width:220px;background:#111;border:1px solid rgba(255,230,0,.3);border-radius:8px;padding:8px 10px;font-size:9px;color:rgba(255,230,0,.85);line-height:1.5;z-index:100;font-weight:700}.p80-info:hover .p80-tooltip{display:block}
#chartWrapper{position:relative}
#scrollbarWrap{padding:0 0 4px 0;background:#080808}
#scrollbarTrack{height:6px;background:#1a1a1a;border-radius:3px;position:relative;cursor:pointer;margin:0 8px}
#scrollbarThumb{height:6px;background:#444;border-radius:3px;position:absolute;top:0;cursor:grab;transition:background .15s;min-width:24px}
#scrollbarThumb:hover,#scrollbarThumb.dragging{background:#00ffff;cursor:grabbing}
.canvas-container{height:clamp(160px,34vw,270px);width:100%}
.sep-line{position:absolute;width:0;border-left:2px dashed rgba(255,255,255,.72);pointer-events:none;z-index:20}
#summaryRow{display:flex;border-top:2px solid #444;background:#060606;overflow:hidden}
#summaryRow.multiline{height:clamp(52px,12vw,64px)}
#summaryRow.singleline{height:clamp(32px,7vw,40px)}
.day-seg{display:flex;flex-direction:row;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;gap:3px;padding:0 3px;flex-wrap:wrap}
#summaryRow.multiline .day-seg{flex-direction:column;align-items:center;gap:1px;padding:2px 3px}
.day-seg.last{justify-content:flex-start}
.day-name{font-size:clamp(8px,2vw,10px);font-weight:900;color:#666;letter-spacing:1px}
.day-rain{font-size:clamp(10px,2.6vw,14px);font-weight:900;color:#ffe600;line-height:1;text-shadow:0 0 8px rgba(255,230,0,.5)}
.day-prob{font-size:clamp(9px,2.2vw,12px);font-weight:900;color:#ffe600}
.unit{font-size:7px;opacity:.6}
.day-temp{display:flex;gap:2px}
.temp-max{font-size:clamp(9px,2.2vw,11px);font-weight:900;color:#ff8844}
.temp-min{font-size:clamp(9px,2.2vw,11px);font-weight:900;color:#88aaff}
</style>

<body>
<div class="wrap">
  <div class="search">
    <input id="cityInput" value="Juvisy-sur-Orge"
           onkeypress="if(event.key==='Enter'){this.blur();load()}"
           autocomplete="off" autocorrect="off" spellcheck="false">
    <button id="clearBtn" onclick="clearSearch()">✕</button>
    <button id="searchBtn" onclick="load()">GO</button>
  </div>
  <div id="sourcesBar"></div>
  <div id="viewBtns">
    <button class="view-btn"        id="btnJm1" onclick="setView('jm1')">◂ J-1</button>
    <button class="view-btn active" id="btnJ1"  onclick="setView('j1')">J+1 ▸</button>
    <button class="view-btn"        id="btnJ8"  onclick="setView('j8')">◂ J+8</button>
    <button id="modeToggle" class="simple" onclick="toggleComplexity()">● SIMPLE</button>
  </div>
  <div class="card">
    <div class="header">
      <div class="header-left">
        <div id="displayTz" class="city-tz"></div>
      </div>
      <div class="legend">
        <div class="leg"><div class="leg-dot" style="background:#ffe600;box-shadow:0 0 6px rgba(255,230,0,.5)"></div><div class="p80-info"><span class="leg-txt" style="color:#ffe600;cursor:help;border-bottom:1px dotted rgba(255,230,0,.4)">SYNTHÈSE P80 ⓘ</span><div class="p80-tooltip">P80 = 80ᵉ percentile sur tous les modèles actifs.<br>Traduction : 80% des modèles prévoient moins de cette valeur — estimation pessimiste-réaliste, ni la médiane ni le pire cas.</div></div></div>
        <div class="leg"><div class="leg-dot" style="background:#4488ff;height:2px"></div><span class="leg-txt" style="color:#4488ff">MAX MODÈLES</span></div>
        <div class="leg"><div class="leg-dot dashed" style="opacity:.4;background:repeating-linear-gradient(90deg,#fff 0,#fff 6px,transparent 6px,transparent 10px)"></div><span class="leg-txt" style="color:#fff;opacity:.4">PROBA %</span></div>
      </div>
    </div>
    <div id="chartWrapper">
      <div class="canvas-container"><canvas id="mainChart"></canvas></div>
      <div id="summaryRow"></div>
      <div id="scrollbarWrap" style="display:none"><div id="scrollbarTrack"><div id="scrollbarThumb"></div></div></div>
    </div>
  </div>

  <div id="radarCard" style="display:none">
    <div id="radarHeader">
      <span id="radarTitle">📡 RADAR PRÉCIPITATIONS</span>
      <div style="display:flex;gap:6px;align-items:center">
        <span id="radarTime">—</span>
        <button id="radarPlayBtn" onclick="toggleRadarPlay()">▶ PLAY</button>
      </div>
    </div>
    <div id="radarMap">
      <div class="radar-crosshair"></div>
    </div>
  </div>
</div>

<script>
const SOURCES=[
  {key:'icon', label:'ICON',    color:'#4488ff',omModel:'icon_seamless'},
  {key:'gfs',  label:'GFS',     color:'#44dd88',omModel:'gfs_seamless'},
  {key:'ifs',  label:'IFS 9km', color:'#cc44ff',omModel:'ecmwf_ifs025'},
  {key:'aifs', label:'AIFS AI', color:'#dd88ff',omModel:'ecmwf_aifs025_single'},
  {key:'mf',   label:'AROME',   color:'#ff8844',omModel:'meteofrance_seamless'},
  {key:'mfhd', label:'AROME HD',color:'#ff6622',omModel:'meteofrance_arome_france_hd'},
  {key:'gem',  label:'GEM',     color:'#44dddd',omModel:'gem_seamless'},
  {key:'knmi', label:'KNMI',    color:'#88ff44',omModel:'knmi_seamless'},
  {key:'ukmo', label:'UKMO',    color:'#ff4488',omModel:'ukmo_seamless'},
  {key:'metno',label:'MET-NO',  color:'#ff44aa',omModel:null},
];

let myChart=null,lastW=0,cityTz='Europe/Paris',N_HRS=0;
let _peaks=[],_idx8hJ0=-1,_idx8hJ1=-1,_drySlots=[],_rainStarts=[],_8hXPos=[];
let _viewMode='j1',_cachedData=null,_cachedJm1=null,_simpleMode=true,_gradCache=null;
let _tempJ1Max=null,_tempJ1Min=null,_tempJ0Max=null,_tempJ0Min=null;
let _radarMap=null,_radarLayer=null,_radarMarker=null,_radarFrames=[],_radarIdx=0,_radarPlaying=false,_radarTimer=null;
let _cityLat=48.6869,_cityLon=2.3814; /* défaut Juvisy */
let _isMob=false;

/* ── maths ── */
function p80(arr){
  const v=arr.filter(x=>x!=null&&isFinite(x)&&x>=0);
  if(!v.length)return 0;
  const s=[...v].sort((a,b)=>a-b),i=.8*(s.length-1),lo=Math.floor(i),hi=Math.ceil(i);
  return s[lo]+(s[hi]-s[lo])*(i-lo);
}
function maxOf(arr){const v=arr.filter(x=>x!=null&&isFinite(x)&&x>=0);return v.length?Math.max(...v):0}
function interpM15(m15,slotF,off){const t=slotF+off/15,si=Math.floor(t),f=t-si;return Math.max(0,(m15[si]??0)*(1-f)+(m15[si+1]??m15[si]??0)*f)}
function localKey(utcStr){
  const l=new Date(new Date(utcStr).toLocaleString('en-US',{timeZone:cityTz}));
  const p=n=>String(n).padStart(2,'0');
  return `${l.getFullYear()}-${p(l.getMonth()+1)}-${p(l.getDate())}T${p(l.getHours())}:00`;
}

/* ── status inline ── */
function showStatus(msg,color){
  let el=document.getElementById('statusMsg');
  if(!el){
    el=document.createElement('div');el.id='statusMsg';
    el.style.cssText='font-size:10px;font-weight:900;padding:4px 10px;border-radius:6px;font-family:Courier New,monospace;transition:all .3s;min-height:0';
    const vb=document.getElementById('viewBtns');
    vb.parentNode.insertBefore(el,vb);
  }
  el.textContent=msg;el.style.color=color;el.style.display=msg?'block':'none';
}

/* ── badges sources ── */
function initBar(){
  const bar=document.getElementById('sourcesBar');
  bar.style.display='flex';
  bar.innerHTML='<span class="src-lbl">Sources</span>';
  SOURCES.forEach(s=>{
    const b=document.createElement('div');
    b.className='src-badge loading';b.id='b_'+s.key;b.dataset.srcKey=s.key;b.style.borderColor=s.color+'44';
    b.innerHTML=`<div class="src-dot" style="background:${s.color}55"></div>${s.label}`;
    b.addEventListener('mouseenter',()=>highlightSource(s.key));
    b.addEventListener('mouseleave',()=>highlightSource(null));
    bar.appendChild(b);
  });
}
function setBadge(key,ok){
  const b=document.getElementById('b_'+key);if(!b)return;
  const src=SOURCES.find(s=>s.key===key);
  b.className='src-badge '+(ok?'ok':'err');
  if(ok){b.style.borderColor=src.color+'66';b.style.background=src.color+'15';
    const d=b.querySelector('.src-dot');d.style.background=src.color;d.style.boxShadow=`0 0 6px ${src.color}`;d.style.animation='none';
  }else{const d=b.querySelector('.src-dot');d.style.background='#ff3d57';d.style.animation='none';}
}

/* ── toggle complexité ── */
function toggleComplexity(){
  _simpleMode=!_simpleMode;
  const btn=document.getElementById('modeToggle');
  btn.textContent=_simpleMode?'● SIMPLE':'○ COMPLEXE';
  btn.classList.toggle('simple',_simpleMode);
  applyComplexity();
}
function applyComplexity(){
  if(!myChart)return;
  const ds=myChart.data.datasets;
  // indices: 0=fill, 1..9=modèles, 10=MAX bleu, 11=P80 jaune, 12=proba, [13=réel si jm1]
  const nSrc=SOURCES.length; // 10
  const idxFill=0;
  const idxModels=[...Array(nSrc)].map((_,i)=>1+i);  // 1..10
  const idxMax=1+nSrc;    // 11
  const idxP80=2+nSrc;    // 12
  const idxProb=3+nSrc;   // 13
  const idxReal=4+nSrc;   // 14 (J-1 only)

  const sb=document.getElementById('sourcesBar');
  if(_simpleMode){
    if(sb)sb.style.display='none';
    idxModels.forEach(i=>{if(ds[i])ds[i].borderColor='transparent';});
    if(ds[idxFill])ds[idxFill].backgroundColor='rgba(255,230,0,0.22)';
    if(ds[idxMax])ds[idxMax].borderColor='transparent';
    if(ds[idxProb])ds[idxProb].borderColor='transparent';
    if(ds[idxReal])ds[idxReal].borderColor='rgba(255,255,255,0.92)';
    /* Rescaler Y sur les données P80 uniquement */
    const p80data=(ds[idxP80]?.data||[]).filter(v=>v!=null&&isFinite(v)&&v>=0);
    const p80max=p80data.length?Math.max(...p80data):1;
    const yMax=Math.max(p80max*1.2,0.5);
    myChart.options.scales.y.max=yMax;
    myChart.options.scales.y.suggestedMax=undefined;
  } else {
    if(sb)sb.style.display='flex';
    SOURCES.forEach((src,si)=>{
      if(ds[1+si])ds[1+si].borderColor=src.color+'50';
    });
    if(ds[idxFill])ds[idxFill].backgroundColor=_gradCache||'rgba(255,230,0,0.18)';
    if(ds[idxMax])ds[idxMax].borderColor='#4488ff';
    if(ds[idxProb]){ds[idxProb].borderColor='rgba(255,255,255,0.85)';ds[idxProb].borderWidth=_isMob?2.5:3.5;ds[idxProb].borderDash=[6,3];}
    if(ds[idxReal])ds[idxReal].borderColor='rgba(255,255,255,0.92)';
    /* Rescaler Y sur MAX toutes courbes */
    const allVals=ds.slice(1,idxProb).flatMap(d=>d.data||[]).filter(v=>v!=null&&isFinite(v)&&v>=0);
    const allMax=allVals.length?Math.max(...allVals):1;
    myChart.options.scales.y.max=undefined;
    myChart.options.scales.y.suggestedMax=undefined;
  }
  myChart.update('none');
}

/* ══════════════════════════════════════════════
   RADAR (Leaflet + RainViewer)
══════════════════════════════════════════════ */
function initRadar(lat,lon){
  _cityLat=lat; _cityLon=lon;
  if(!_radarMap){
    /* zoom 6 = ~150km autour, RainViewer max tile zoom = 7 */
    _radarMap=L.map('radarMap',{
      center:[lat,lon], zoom:6,
      minZoom:3, maxZoom:7,
      zoomControl:true, attributionControl:false,
    });
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
      maxZoom:7, tileSize:256,
    }).addTo(_radarMap);
    /* Marqueur ville */
    _radarMarker=L.circleMarker([lat,lon],{
      radius:6, color:'#ffe600', weight:2, fillColor:'#ffe600', fillOpacity:0.9
    }).addTo(_radarMap);
    /* Clic → changer de ville */
    _radarMap.on('click',e=>reverseGeocode(e.latlng.lat,e.latlng.lng));
  } else {
    _radarMap.setView([lat,lon],6);
    if(_radarMarker) _radarMarker.setLatLng([lat,lon]);
  }
  /* Attendre que la carte soit visible avant de charger */
  setTimeout(()=>{
    _radarMap.invalidateSize();
    loadRadarFrames();
  },100);
}

async function loadRadarFrames(){
  try{
    const data=await fetchRetry('https://api.rainviewer.com/public/weather-maps.json');
    if(!data?.radar?.past)return;
    _radarFrames=[...data.radar.past,...(data.radar.nowcast||[])];
    _radarIdx=_radarFrames.length-1;
    showRadarFrame(_radarIdx);
  }catch(e){console.error('Radar error',e);}
}

function showRadarFrame(idx){
  if(!_radarFrames.length||!_radarMap)return;
  idx=Math.max(0,Math.min(idx,_radarFrames.length-1));
  _radarIdx=idx;
  const frame=_radarFrames[idx];
  if(_radarLayer){_radarMap.removeLayer(_radarLayer);}
  _radarLayer=L.tileLayer(
    `https://tilecache.rainviewer.com${frame.path}/256/{z}/{x}/{y}/2/1_1.png`,
    {opacity:0.85,maxZoom:7,tileSize:256,noWrap:false}
  ).addTo(_radarMap);
  /* Heure locale */
  const d=new Date(frame.time*1000);
  const hh=String(d.getHours()).padStart(2,'0');
  const mm=String(d.getMinutes()).padStart(2,'0');
  document.getElementById('radarTime').textContent=
    (frame.nowcast?'🔮 ':'')+(idx===_radarFrames.length-1&&!frame.nowcast?'▶ ':'')+(hh+':'+mm);
}

function toggleRadarPlay(){
  _radarPlaying=!_radarPlaying;
  const btn=document.getElementById('radarPlayBtn');
  btn.textContent=_radarPlaying?'⏹ STOP':'▶ PLAY';
  btn.classList.toggle('playing',_radarPlaying);
  if(_radarPlaying){
    _radarTimer=setInterval(()=>{
      _radarIdx=(_radarIdx+1)%_radarFrames.length;
      showRadarFrame(_radarIdx);
    },600);
  } else {
    clearInterval(_radarTimer);
    /* Revenir à la dernière image réelle */
    const lastReal=_radarFrames.reduce((best,f,i)=>(!f.nowcast?i:best),0);
    showRadarFrame(lastReal);
  }
}

async function reverseGeocode(lat,lng){
  try{
    /* reverse geocoding via Nominatim uniquement */
    /* Open-Meteo geocoding ne supporte pas le reverse — on utilise Nominatim */
    const nom=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat.toFixed(5)}&lon=${lng.toFixed(5)}&format=json&accept-language=fr`).then(r=>r.json());
    if(nom?.address){
      const city=nom.address.city||nom.address.town||nom.address.village||nom.address.municipality||nom.display_name.split(',')[0];
      document.getElementById('cityInput').value=city;
      load();
    }
  }catch(e){console.error('Reverse geocode error',e);}
}

/* ── clear search ── */
function clearSearch(){
  const inp=document.getElementById('cityInput');
  inp.value='';inp.focus();
  document.getElementById('clearBtn').style.display='none';
}
document.addEventListener('DOMContentLoaded',()=>{
  const inp=document.getElementById('cityInput');
  const btn=document.getElementById('clearBtn');
  inp.addEventListener('input',()=>{btn.style.display=inp.value?'block':'none';});
  if(inp.value)btn.style.display='block';
});

/* ── fetchRetry global ── */
async function fetchRetry(url,tries=3,delay=1200){
  for(let i=0;i<tries;i++){
    try{const r=await fetch(url);if(r.ok)return await r.json();}
    catch(e){if(i<tries-1)await new Promise(res=>setTimeout(res,delay*(i+1)));}
  }
  return null;
}

/* ── load ── */
async function load(){
  const city=document.getElementById('cityInput').value.trim();if(!city)return;
  const btn=document.getElementById('searchBtn');btn.disabled=true;btn.textContent='…';
  try{
    let geo=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=5&language=fr`).then(r=>r.json());
    if(!geo.results?.length){
      /* Essai avec les premières lettres */
      const short=city.split(' ')[0].slice(0,4);
      geo=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(short)}&count=5&language=fr`).then(r=>r.json());
    }
    if(!geo.results?.length){showStatus('❌ Aucune ville trouvée près de "'+city+'"','#ff3d57');return;}
    /* Prendre le résultat le plus proche si coordonnées dispo, sinon le premier */
    const best=geo.results[0];

/* ── matrices ── */
function buildRainMx(omMain,metno,tIdx){
  const mx={},N=N_HRS,h=omMain.hourly;
  SOURCES.filter(s=>s.omModel).forEach(s=>{const k=`precipitation_${s.omModel}`;mx[s.key]=h[k]?[...h[k]]:null;});
  if(metno?.properties?.timeseries){
    const arr=new Array(N).fill(null);
    metno.properties.timeseries.forEach(e=>{const i=tIdx[localKey(e.time)]??-1;if(i>=0&&i<N){const v=e.data?.next_1_hours?.details?.precipitation_amount;if(v!=null)arr[i]=v;}});
    mx['metno']=arr;
  }else mx['metno']=null;
  return mx;
}
function buildProbMx(omMain,metno,tIdx){
  const mx={},N=N_HRS,h=omMain.hourly;
  SOURCES.filter(s=>s.omModel).forEach(s=>{const k=`precipitation_probability_${s.omModel}`;mx[s.key]=h[k]?[...h[k]]:null;});
  if(metno?.properties?.timeseries){
    const arr=new Array(N).fill(null);
    metno.properties.timeseries.forEach(e=>{const i=tIdx[localKey(e.time)]??-1;if(i>=0&&i<N){const v=e.data?.next_1_hours?.details?.probability_of_precipitation;if(v!=null)arr[i]=v;}});
    mx['metno']=arr;
  }else mx['metno']=null;
  return mx;
}
const synthR=(i,mx)=>p80(SOURCES.map(s=>mx[s.key]?.[i]));
const synthP=(i,mx)=>Math.min(100,maxOf(SOURCES.map(s=>mx[s.key]?.[i])));
const maxR=(i,mx)=>maxOf(SOURCES.map(s=>mx[s.key]?.[i]));

/* ── données J-1 ── */
async function fetchJm1Data(lat,lon){
  try{
    /* Calculer la date d'hier en heure locale */
    const nowLocal=new Date(new Date().toLocaleString('en-US',{timeZone:cityTz}));
    const yest=new Date(nowLocal);yest.setDate(nowLocal.getDate()-1);
    const fmt=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const dateStr=fmt(yest);

    /* Seulement les modèles OM (pas metno) */
    const omSources=SOURCES.filter(s=>s.omModel);
    const omModels=omSources.map(s=>s.omModel).join(',');

    const [pastForecast,realData]=await Promise.all([
      fetchRetry(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=precipitation,precipitation_probability&models=${encodeURIComponent(omModels)}&past_days=1&forecast_days=0&timezone=auto`),
      fetchRetry(`https://historical-forecast-api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=precipitation&start_date=${dateStr}&end_date=${dateStr}&timezone=auto`),
    ]);
    _cachedJm1={pastForecast,realData,dateStr};
  }catch(e){console.error('J-1 fetch error',e);}
}

/* ── points ── */
function processData(omMain,omM15,rainMx,probMx){
  const pts=[],mods=SOURCES.map(()=>[]);
  const now=new Date(new Date().toLocaleString('en-US',{timeZone:cityTz}));
  const h=now.getHours(),m=now.getMinutes(),s=now.getSeconds();
  /* minutely_15 : AROME HD (mis à jour /h, 1.5km) + ICON D2 — MAX des deux */
  const m15_arome = omM15?.minutely_15?.precipitation_meteofrance_arome_france_hd ?? [];
  const m15_icon2 = omM15?.minutely_15?.precipitation_icon_d2 ?? [];
  const m15_best  = omM15?.minutely_15?.precipitation ?? [];
  const m15len = Math.max(m15_arome.length, m15_icon2.length, m15_best.length);
  const m15 = Array.from({length: m15len}, (_, i) => {
    const vals = [];
    if (m15_arome[i] != null && isFinite(m15_arome[i])) vals.push(m15_arome[i]);
    if (m15_icon2[i] != null && isFinite(m15_icon2[i])) vals.push(m15_icon2[i]);
    /* fallback best_match si hors zone AROME/ICON-D2 */
    if (!vals.length && m15_best[i] != null && isFinite(m15_best[i])) vals.push(m15_best[i]);
    return vals.length ? Math.max(...vals) : 0;
  });
  const slotF=h*4+(m+s/60)/15;
  function push(t,d,idx){
    const r=idx>=0?synthR(idx,rainMx):0,mx=idx>=0?maxR(idx,rainMx):0,p=idx>=0?synthP(idx,probMx):0;
    pts.push({t,d,r,mx,p,hourIdx:idx});
    SOURCES.forEach((src,si)=>mods[si].push(idx>=0?(rainMx[src.key]?.[idx]??null):null));
  }
  /* Minutes restantes avant la prochaine heure (pas en vue J+8) */
  let minutesAdded=false;
  if(_viewMode!=='j8'&&m15.length>0&&m>0){
    const minsToNextHour=60-m;
    for(let o=5;o<minsToNextHour;o+=5){
      const slotIdx=Math.min(Math.round(slotF+o/15),m15.length-1);
      const r=Math.max(0,m15[slotIdx]??0);
      pts.push({t:`+${o}'`,d:0,r,mx:r,p:synthP(h,probMx),hourIdx:-1});
      SOURCES.forEach((_,si)=>mods[si].push(null));
      minutesAdded=true;
    }
  }
  /* Heures : toujours depuis h+1 — h+1 = données rainMx de l'heure suivante,
     les minutes m15 couvrent h+0→h+1, pas de doublon car sources différentes */
  for(let i=h+1;i<=23;i++) push(i+'h',0,i);
  // J+1 toujours heure/heure
  for(let hr=0;hr<24;hr++){const idx=24+hr;if(idx<N_HRS)push(hr+'h',1,idx);}
  if(_viewMode==='j8'){
    for(let d=2;d<=4;d++)for(let hr=0;hr<24;hr+=3){const idx=d*24+hr;if(idx<N_HRS)push(hr+'h',d,idx);}
    for(let d=5;d<=8;d++)for(let hr=0;hr<24;hr+=8){const idx=d*24+hr;if(idx<N_HRS)push(hr+'h',d,idx);}
  }
  render(pts,mods);
}

/* ── traitement J-1 ── */
function processJm1(jm1){
  if(!jm1?.pastForecast?.hourly?.time){
    showStatus('❌ Données J-1 indisponibles','#ff3d57');return;
  }
  showStatus('','');
  const h=jm1.pastForecast.hourly;
  const dateStr=jm1.dateStr;
  const omSources=SOURCES.filter(s=>s.omModel);
  const pts=[],mods=SOURCES.map(()=>[]);

  /* Parcourir les 24h d'hier dans la réponse */
  h.time.forEach((t,idx)=>{
    /* t est en heure locale grâce à timezone=auto */
    if(!t.startsWith(dateStr)) return;
    const hr=parseInt(t.slice(11,13));

    /* P80 sur les modèles OM uniquement */
    const rainVals=omSources.map(s=>{
      const k=`precipitation_${s.omModel}`;
      const v=h[k]?.[idx];
      return (v!=null&&isFinite(v)&&v>=0)?v:null;
    });
    const r=p80(rainVals);
    const mx=maxOf(rainVals);
    const probVals=omSources.map(s=>{
      const k=`precipitation_probability_${s.omModel}`;
      const v=h[k]?.[idx];
      return (v!=null&&isFinite(v)&&v>=0)?v:null;
    });
    const prob=Math.min(100,maxOf(probVals));

    pts.push({t:hr+'h',d:0,r,mx,p:prob,hourIdx:idx});

    /* mods : une entrée par source dans SOURCES (metno = null) */
    SOURCES.forEach(src=>{
      if(!src.omModel){mods[SOURCES.indexOf(src)].push(null);return;}
      const k=`precipitation_${src.omModel}`;
      const v=h[k]?.[idx];
      mods[SOURCES.indexOf(src)].push((v!=null&&isFinite(v))?v:null);
    });
  });

  if(!pts.length){showStatus('❌ Aucune donnée J-1 pour cette date','#ff3d57');return;}

  /* Précipitations réelles */
  const realArr=new Array(24).fill(null);
  if(jm1.realData?.hourly?.time){
    jm1.realData.hourly.time.forEach((t,i)=>{
      if(!t.startsWith(dateStr))return;
      const hr=parseInt(t.slice(11,13));
      const v=jm1.realData.hourly.precipitation?.[i];
      if(v!=null&&isFinite(v)) realArr[hr]=v;
    });
  }
  /* Aligner realArr sur pts */
  const realPts=pts.map(p=>{
    const hr=parseInt(p.t);
    return isNaN(hr)?null:realArr[hr];
  });

  renderJm1(pts,mods,realPts);
}

/* ── détection pics ── */
function detectPeaks(values,labels,threshold,minDist){
  threshold=threshold??0.15;minDist=minDist??4;
  const peaks=[];
  for(let i=1;i<values.length-1;i++){
    const v=values[i];if(v==null||v<threshold)continue;
    if(v>=(values[i-1]??0)&&v>=(values[i+1]??0)){
      if(!peaks.length||i-peaks[peaks.length-1].idx>=minDist)peaks.push({idx:i,val:v,label:labels[i]});
      else if(v>peaks[peaks.length-1].val)peaks[peaks.length-1]={idx:i,val:v,label:labels[i]};
    }
  }
  return peaks;
}

/* ── détection plages sèches (8h-20h, >2h, pluie<1mm ET proba<25%) ── */
function detectDrySlots(pts){
  const slots=[];
  function hourOf(p){if(p.t.includes("'"))return -1;const h=parseInt(p.t);return isNaN(h)?-1:h;}
  let runStart=-1;
  for(let i=0;i<pts.length;i++){
    const h=hourOf(pts[i]),inDay=h>=8&&h<=20,dry=inDay&&pts[i].mx<1&&pts[i].p<50;
    if(dry&&runStart<0)runStart=i;
    else if(!dry&&runStart>=0){if(i-runStart>2)slots.push({startIdx:runStart,endIdx:i-1});runStart=-1;}
  }
  if(runStart>=0&&pts.length-runStart>2)slots.push({startIdx:runStart,endIdx:pts.length-1});
  return slots;
}

/* ── roundRect ── */
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

/* ── badge encadré sur axe X ── */
function drawTickBadge(c,xPx,bottom,lbl,fSize,pad,borderCol,textCol){
  c.save();c.font=`900 ${fSize}px 'Courier New',monospace`;
  const tw=c.measureText(lbl).width,bw=tw+pad*2,bh=fSize+pad*2,bx=xPx-bw/2,by=bottom+4;
  c.fillStyle='#000';roundRect(c,bx-1,by-1,bw+2,bh+2,4);c.fill();
  c.strokeStyle=borderCol;c.lineWidth=1.2;roundRect(c,bx,by,bw,bh,3);c.stroke();
  c.fillStyle=textCol;c.textAlign='center';c.textBaseline='middle';c.fillText(lbl,xPx,by+bh/2);
  c.restore();
}

/* ── balle de tennis canvas ── */
function drawTennisBall(c,cx,cy,r){
  c.save();
  // Corps jaune-vert
  c.beginPath();c.arc(cx,cy,r,0,Math.PI*2);
  c.fillStyle='#c8e000';c.fill();
  // Liseré blanc courbé haut
  c.strokeStyle='rgba(255,255,255,0.9)';c.lineWidth=r*0.22;
  c.beginPath();c.arc(cx,cy,r*0.58,Math.PI*1.1,Math.PI*1.9);c.stroke();
  // Liseré blanc courbé bas
  c.beginPath();c.arc(cx,cy,r*0.58,Math.PI*0.1,Math.PI*0.9);c.stroke();
  // Contour
  c.strokeStyle='rgba(0,0,0,0.3)';c.lineWidth=1;
  c.beginPath();c.arc(cx,cy,r,0,Math.PI*2);c.stroke();
  c.restore();
}

/* ── icône météo canvas : soleil / nuage / pluie selon intensité ── */
function drawWeatherIcon(c,cx,cy,r,rainMm,prob){
  c.save();
  c.lineCap='round';c.lineJoin='round';
  if(rainMm<0.3&&prob<30){
    /* ── SOLEIL ── */
    const sr=r*0.42;
    c.beginPath();c.arc(cx,cy,sr,0,Math.PI*2);
    c.fillStyle='#ffe600';c.fill();
    c.strokeStyle='#ffe600';c.lineWidth=r*0.12;
    for(let i=0;i<8;i++){
      const a=i*Math.PI/4,r1=sr+r*0.18,r2=sr+r*0.38;
      c.beginPath();c.moveTo(cx+Math.cos(a)*r1,cy+Math.sin(a)*r1);
      c.lineTo(cx+Math.cos(a)*r2,cy+Math.sin(a)*r2);c.stroke();
    }
  } else {
    /* nuage de base */
    const cw=r*0.9,ch=r*0.45,cbx=cx-cw*0.1,cby=cy+r*0.05;
    c.beginPath();
    c.arc(cbx-cw*0.18,cby,ch*0.7,Math.PI,0);
    c.arc(cbx+cw*0.12,cby-ch*0.3,ch*0.95,Math.PI,0);
    c.arc(cbx+cw*0.42,cby,ch*0.6,Math.PI,0);
    c.lineTo(cbx+cw*0.42+ch*0.6,cby+ch*0.5);
    c.lineTo(cbx-cw*0.18-ch*0.7,cby+ch*0.5);
    c.closePath();
    /* couleur nuage selon intensité */
    const intensity=Math.min(rainMm/5,1);
    const gray=Math.round(180-intensity*130);
    c.fillStyle=`rgb(${gray},${gray},${gray+10})`;c.fill();
    c.strokeStyle=`rgba(255,255,255,0.3)`;c.lineWidth=r*0.07;c.stroke();

    if(rainMm>=0.3){
      /* gouttes de pluie */
      const drops=rainMm<1?2:rainMm<3?3:4;
      const dropColor=rainMm<1?'rgba(120,180,255,0.7)':rainMm<3?'rgba(80,140,255,0.85)':'rgba(60,100,255,1)';
      c.strokeStyle=dropColor;c.lineWidth=r*0.12;
      const dropLen=r*(0.2+Math.min(rainMm/4,0.25));
      for(let i=0;i<drops;i++){
        const dx=cx-cw*0.3+i*(cw*0.55/(drops-1||1));
        const dy0=cby+ch*0.6+r*0.1;
        c.beginPath();c.moveTo(dx,dy0);c.lineTo(dx-r*0.08,dy0+dropLen);c.stroke();
      }
    }
  }
  c.restore();
}

/* ── surbrillance source au hover ── */
function highlightSource(key){
  if(!myChart)return;
  const ds=myChart.data.datasets;
  // Les modelDS commencent à l'index 1 (après le gradient fill)
  SOURCES.forEach((src,si)=>{
    const dsIdx=1+si; // index dans datasets (0=fill, 1..N=modèles)
    if(dsIdx>=ds.length)return;
    if(key===null){
      // Reset : toutes les courbes à leur opacité normale
      ds[dsIdx].borderColor=src.color+'50';
      ds[dsIdx].borderWidth=_isMob?.8:1.2;
    } else if(src.key===key){
      // Surbrillance : couleur pleine, trait épais
      ds[dsIdx].borderColor=src.color;
      ds[dsIdx].borderWidth=_isMob?2.5:3.5;
    } else {
      // Estompage des autres
      ds[dsIdx].borderColor=src.color+'18';
      ds[dsIdx].borderWidth=_isMob?.5:.8;
    }
  });
  myChart.update('none');
}

/* ── renderJm1 ── */
function renderJm1(pts,mods,realPrecip){
  const ctx=document.getElementById('mainChart').getContext('2d');
  if(myChart)myChart.destroy();lastW=0;
  _isMob=window.innerWidth<500;const isMob=_isMob;
  _peaks=[];_drySlots=[];_idx8hJ0=-1;_idx8hJ1=-1;_rainStarts=[];_8hXPos=[];

  const realArr=realPrecip; /* déjà aligné sur pts */

  const grad=ctx.createLinearGradient(0,0,0,380);
  grad.addColorStop(0,'rgba(255,230,0,0.35)');
  grad.addColorStop(0.55,'rgba(255,230,0,0.06)');
  grad.addColorStop(1,'rgba(255,230,0,0)');
  _gradCache=grad;

  const modelDS=SOURCES.map((src,si)=>({
    data:mods[si],borderColor:_simpleMode?'transparent':src.color+'50',borderWidth:isMob?.8:1.2,
    tension:0.3,pointRadius:0,fill:false,yAxisID:'y',order:4,spanGaps:true,
  }));

  myChart=new Chart(ctx,{
    type:'line',
    data:{
      labels:pts.map(p=>p.t),
      datasets:[
        /* fond P80 */
        {data:pts.map(p=>p.r),borderColor:'transparent',borderWidth:0,fill:true,backgroundColor:grad,tension:0.4,pointRadius:0,yAxisID:'y',order:5},
        ...modelDS,
        /* MAX modèles bleu pointillé */
        {data:pts.map(p=>p.mx),borderColor:'#4488ff',borderWidth:isMob?1:1.5,borderDash:[8,3,2,3],fill:false,tension:0.4,pointRadius:0,yAxisID:'y',order:2},
        /* P80 jaune */
        {data:pts.map(p=>p.r),borderColor:'#ffe600',borderWidth:isMob?2.5:3.5,fill:false,tension:0.4,pointRadius:0,yAxisID:'y',order:1},
        /* Proba pointillé léger */

/* ══════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════ */
function render(pts,mods){
  const ctx=document.getElementById('mainChart').getContext('2d');
  if(myChart)myChart.destroy();
  lastW=0;
  _isMob=window.innerWidth<500;
  const isMob=_isMob;
  const maxVals=pts.map(p=>p.mx);
  const p80Vals=pts.map(p=>p.r);
  _peaks=detectPeaks(p80Vals,pts.map(p=>p.t),0.15,isMob?3:4);
  _drySlots=detectDrySlots(pts);
  _idx8hJ0=pts.findIndex(p=>p.d===0&&p.t==='8h');
  _idx8hJ1=pts.findIndex(p=>p.d===1&&p.t==='8h');
  _rainStarts=[];
  for(let i=1;i<maxVals.length;i++){
    if((maxVals[i-1]??0)<0.05&&(maxVals[i]??0)>=0.05)_rainStarts.push({idx:i,label:pts[i].t});
  }

  const grad=ctx.createLinearGradient(0,0,0,380);
  grad.addColorStop(0,'rgba(255,230,0,0.35)');
  grad.addColorStop(0.55,'rgba(255,230,0,0.06)');
  grad.addColorStop(1,'rgba(255,230,0,0)');
  _gradCache=grad;

  const modelDS=SOURCES.map((src,si)=>({
    data:mods[si],borderColor:_simpleMode?'transparent':src.color+'50',borderWidth:isMob?.8:1.2,
    tension:0.3,pointRadius:0,fill:false,yAxisID:'y',order:4,spanGaps:true,
  }));

  myChart=new Chart(ctx,{
    type:'line',
    data:{
      labels:pts.map(p=>p.t),
      datasets:[
        {data:pts.map(p=>p.r),borderColor:'transparent',borderWidth:0,fill:true,backgroundColor:_simpleMode?'rgba(255,230,0,0.22)':grad,tension:0.4,pointRadius:0,yAxisID:'y',order:5},
        ...modelDS,
        {data:maxVals,borderColor:_simpleMode?'transparent':'#4488ff',borderWidth:isMob?1:1.5,borderDash:[8,3,2,3],fill:false,tension:0.4,pointRadius:0,yAxisID:'y',order:2},
        {data:pts.map(p=>p.r),borderColor:'#ffe600',borderWidth:isMob?2.5:3.5,fill:false,tension:0.4,pointRadius:0,yAxisID:'y',order:1},
        {data:pts.map(p=>p.p),borderColor:_simpleMode?'transparent':'rgba(255,255,255,0.35)',borderWidth:isMob?.8:1,borderDash:[2,4],tension:0.4,pointRadius:0,fill:false,yAxisID:'yProb',order:3},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,animation:false,
      scales:{
        x:{
          ticks:{color:'#bbb',font:{weight:'bold',size:isMob?8:10,family:'Courier New'},maxRotation:0,autoSkip:false,
            callback(val){
              const l=this.getLabelForValue(val);if(!l)return null;
              if(l.includes("'"))return l;
              if(isMob){const n=parseInt(l);if(!isNaN(n)&&n%3!==0)return null;}
              return l;
            }
          },
          grid:{display:false},border:{color:'#555'}
        },
        y:{position:'left',beginAtZero:true,grid:{color:'#181818',lineWidth:1},
          ticks:{color:'#ffe600',font:{weight:'bold',size:isMob?8:11,family:'Courier New'}},
          border:{color:'#555'},title:{display:!isMob,text:'mm/h',color:'#ffe600',font:{size:9,family:'Courier New'}}
        },
        yProb:{position:'right',min:0,max:100,display:true,grid:{display:false},
          ticks:{color:'rgba(255,255,255,0.4)',font:{weight:'bold',size:isMob?8:11,family:'Courier New'},callback:v=>v+'%',stepSize:25},
          border:{color:'#555'},title:{display:!isMob,text:'prob.',color:'rgba(255,255,255,0.4)',font:{size:9,family:'Courier New'}}
        }
      },
      plugins:{legend:{display:false},tooltip:{enabled:false}}
    },
    plugins:[
      /* séparateurs + résumé */
      {id:'overlay',afterDraw(chart){if(chart.width!==lastW){lastW=chart.width;buildOverlays(chart,pts);}else{updateOverlayPositions(chart,pts);}}},

      /* plages sèches avec balle tennis */
      {id:'drySlots',afterDatasetsDraw(chart){
        if(!_drySlots.length)return;
        const {ctx:c,scales:{x},chartArea:{top,bottom}}=chart;
        const step=Math.abs(x.getPixelForValue(1)-x.getPixelForValue(0))/2;
        _drySlots.forEach(sl=>{
          const x0=x.getPixelForValue(sl.startIdx)-step;
          const x1=x.getPixelForValue(sl.endIdx)+step;
          if(x1<x.left||x0>x.right)return;
          const cx0=Math.max(x0,x.left),cx1=Math.min(x1,x.right);
          const midX=(cx0+cx1)/2,slotW=cx1-cx0;
          c.save();
          // fond jaune doux
          c.fillStyle='rgba(255,230,0,0.09)';
          c.fillRect(cx0,top,slotW,bottom-top);
          // bordures pointillées
          c.strokeStyle='rgba(255,230,0,0.3)';c.lineWidth=1;c.setLineDash([3,3]);
          c.beginPath();c.moveTo(cx0,top);c.lineTo(cx0,bottom);c.stroke();
          c.beginPath();c.moveTo(cx1,top);c.lineTo(cx1,bottom);c.stroke();
          c.setLineDash([]);
          // balle de tennis
          const ballR=isMob?7:10;
          drawTennisBall(c,midX,top+8+ballR,ballR);
          // heures début→fin
          const fSize=isMob?10:12;
          const startLbl=pts[sl.startIdx].t,endLbl=pts[sl.endIdx].t;
          c.font=`900 ${fSize}px 'Courier New',monospace`;
          const timeStr=startLbl+'→'+endLbl;
          const needed=c.measureText(timeStr).width+4;
          const textY=top+8+ballR*2+5;
          c.fillStyle='rgba(255,230,0,0.85)';
          if(slotW>=needed){
            c.textAlign='center';c.textBaseline='top';
            c.fillText(timeStr,midX,textY);
          }else{
            const needHalf=c.measureText(startLbl).width+2;
            if(slotW/2>=needHalf){
              c.textBaseline='top';
              c.textAlign='left';c.fillText(startLbl,cx0+3,textY);
              c.textAlign='right';c.fillText(endLbl,cx1-3,textY);
            }
          }
          c.restore();
        });
      }},

      /* icône météo sur traits 8h */
      {id:'bike8h',afterDraw(chart){
        if(!_8hXPos.length)return;
        const {ctx:c,chartArea:{top}}=chart;
        const r=isMob?11:15;
        _8hXPos.forEach(({xPx,day})=>{
          /* Pts autour de 8h (7h→10h) pour le bon jour */
          const around8h=pts.filter(p=>{
            if(p.d!==day)return false;
            const h=parseInt(p.t);
            return !isNaN(h)&&h>=7&&h<=10;
          });
          const at8h=pts.find(p=>p.d===day&&p.t==='8h');
          const ref=around8h.length?around8h:at8h?[at8h]:[];
          const rainVal=ref.length?ref.reduce((s,p)=>s+p.r,0)/ref.length:0;
          const probVal=ref.length?ref.reduce((s,p)=>s+p.p,0)/ref.length:0;
          c.save();
          c.beginPath();c.arc(xPx,top+r+6,r+3,0,Math.PI*2);
          c.fillStyle='rgba(0,0,0,0.7)';c.fill();
          c.restore();
          drawWeatherIcon(c,xPx,top+r+6,r,rainVal,probVal);
        });
      }},

      /* trait pointillé jaune aux pics + point courbe */
      {id:'peakLines',afterDatasetsDraw(chart){
        if(!_peaks.length)return;
        const {ctx:c,scales:{x,y},chartArea:{top,bottom}}=chart;
        _peaks.forEach(pk=>{
          const xPx=x.getPixelForValue(pk.idx),yPx=y.getPixelForValue(pk.val);
          if(xPx<x.left||xPx>x.right)return;
          c.save();
          c.strokeStyle='rgba(255,230,0,0.5)';c.lineWidth=1;c.setLineDash([3,3]);
          c.beginPath();c.moveTo(xPx,top);c.lineTo(xPx,bottom);c.stroke();
          c.setLineDash([]);
          c.beginPath();c.arc(xPx,yPx,isMob?3.5:4.5,0,Math.PI*2);
          c.fillStyle='#ffe600';c.fill();
          c.restore();
        });
      }},

      /* badges axe X : jaune=pics, cyan=début pluie */
      {id:'axisLabels',afterDraw(chart){
        const {ctx:c,scales:{x},chartArea:{bottom}}=chart;
        const fSize=isMob?8:10,pad=4;
        _peaks.forEach(pk=>{
          const xPx=x.getPixelForValue(pk.idx);
          if(xPx<x.left||xPx>x.right)return;
          drawTickBadge(c,xPx,bottom,pk.label,fSize,pad,'rgba(255,230,0,0.9)','#ffe600');
        });
        _rainStarts.forEach(rs=>{
          const xPx=x.getPixelForValue(rs.idx);
          if(xPx<x.left||xPx>x.right)return;
          const overlap=_peaks.some(pk=>Math.abs(x.getPixelForValue(pk.idx)-xPx)<6);
          if(!overlap)drawTickBadge(c,xPx,bottom,rs.label,fSize,pad,'rgba(0,255,255,0.9)','#00ffff');
        });
      }}
    ]
  });
  setTimeout(applyComplexity,0);
}

/* ── repositionnement au zoom/pan : reconstruction complète des lignes ── */
function updateOverlayPositions(chart,pts){
  /* Réutilise buildOverlays mais sans recréer le chart — juste les éléments DOM */
  buildOverlays(chart,pts);
}

/* ── overlays CSS ── */
function buildOverlays(chart,pts){
  const {chartArea,scales:{x},width:cW}=chart;
  const wrapper=document.getElementById('chartWrapper');
  wrapper.querySelectorAll('.sep-line').forEach(e=>e.remove());
  const dfi={};pts.forEach((p,i)=>{if(dfi[p.d]===undefined)dfi[p.d]=i;});
  const days=Object.keys(dfi).map(Number).sort((a,b)=>a-b);
  const wH=wrapper.offsetHeight;
  const xp={};days.forEach(d=>{xp[d]=x.getPixelForValue(dfi[d]);});
  function addLine(xPx,graphOnly){
    const l=document.createElement('div');l.className='sep-line';
    const h=graphOnly?(chartArea.bottom-chartArea.top):(wH-chartArea.top);
    l.style.cssText=`left:${xPx}px;top:${chartArea.top}px;height:${h}px;`;
    wrapper.appendChild(l);
  }
  days.slice(1).forEach(d=>addLine(xp[d],false));
  _8hXPos=[];
  [[_idx8hJ0,0],[_idx8hJ1,1]].forEach(([idx,day])=>{
    if(idx<0)return;
    const xPx=x.getPixelForValue(idx);
    if(xPx>chartArea.left&&xPx<chartArea.right){addLine(xPx,true);_8hXPos.push({xPx,day});}
  });
  buildSummary(chart,pts,days,xp);
}

/* ── résumé par jour ── */
function buildSummary(chart,pts,days,xp){
  const {chartArea,scales:{x},width:cW}=chart;
  const row=document.getElementById('summaryRow');
  const dn=['DIM','LUN','MAR','MER','JEU','VEN','SAM'];
  const cn=new Date(new Date().toLocaleString('en-US',{timeZone:cityTz}));
  row.style.paddingLeft=chartArea.left+'px';
  row.style.paddingRight=(cW-chartArea.right)+'px';
  row.innerHTML='';
  /* Utiliser les bornes réelles de la zone visible (respecte le zoom) */
  const visLeft=chartArea.left;
  const visRight=chartArea.right;
  /* Clipper xp dans la zone visible */
  const xpClamped={};
  days.forEach(d=>{xpClamped[d]=Math.max(visLeft,Math.min(visRight,xp[d]));});
  const lastXPx=visRight;
  const starts=days.map((d,di)=>di===0?visLeft:xpClamped[d]);
  const ends=days.map((d,di)=>di===days.length-1?lastXPx:xpClamped[days[di+1]]);
  const innerW=days.slice(0,-1).map((_,di)=>Math.max(0,ends[di]-starts[di]));
  const stdW=innerW.length?innerW.reduce((a,b)=>a+b,0)/innerW.length:60;
  days.forEach((d,di)=>{
    const date=new Date(cn);date.setDate(cn.getDate()+d);
    const isLast=di===days.length-1;
    const rawW=Math.max(0,ends[di]-starts[di]);
    const w=isLast?Math.max(rawW,stdW):rawW;
    const dd=pts.filter(p=>p.d===d);
    const total=dd.reduce((s,p)=>s+p.mx,0);
    const maxP=Math.max(...dd.map(p=>p.p),0);
    const lbl=d===0?'AUJ.':dn[date.getDay()];
    const div=document.createElement('div');
    div.className='day-seg'+(isLast&&days.length>2?' last':'');div.style.width=w+'px';
    const tMax=d===0?_tempJ0Max:d===1?_tempJ1Max:null;
    const tMin=d===0?_tempJ0Min:d===1?_tempJ1Min:null;

    const tempInline=tMax!==null?`<span class="temp-min">${Math.round(tMin??0)}°</span><span class="temp-max">/${Math.round(tMax)}°</span>`:'';
    div.innerHTML=`<span class="day-name">${lbl}</span><span class="day-rain">${total.toFixed(1)}<span class="unit">mm</span></span><span class="day-prob">${Math.round(maxP)}%</span>${tempInline}`;
    row.appendChild(div);
  });
}

/* ── Pinch-zoom et pan tactile sur le graphique ── */
(function(){
  const wrapper=()=>document.getElementById('chartWrapper');
  let startDist=0,startRange=null,startPan=null,startX=0;
  let zoomMin=0,zoomMax=1; // [0..1] fraction de l'axe X visible

  function getTouches(e){return Array.from(e.touches);}
  function dist(a,b){return Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);}

  function applyZoom(){
    if(!myChart)return;
    const n=myChart.data.labels.length;
    const lo=Math.round(zoomMin*n);
    const hi=Math.round(zoomMax*n)-1;
    myChart.options.scales.x.min=lo;
    myChart.options.scales.x.max=hi;
    myChart.update('none');
    updateScrollbar();
  }
  function updateScrollbar(){
    const wrap=document.getElementById('scrollbarWrap');
    const track=document.getElementById('scrollbarTrack');
    const thumb=document.getElementById('scrollbarThumb');
    if(!wrap||!track||!thumb)return;
    const zoomed=(zoomMax-zoomMin)<0.999;
    wrap.style.display=zoomed?'block':'none';
    if(!zoomed)return;
    const tw=track.offsetWidth;
    const thumbW=Math.max(24,tw*(zoomMax-zoomMin));
    const thumbLeft=tw*zoomMin;
    thumb.style.width=thumbW+'px';
    thumb.style.left=Math.min(tw-thumbW,thumbLeft)+'px';
  }

  /* Drag scrollbar */
  let sbDragging=false,sbStartX=0,sbStartMin=0;
  function initScrollbar(){
    const track=document.getElementById('scrollbarTrack');
    const thumb=document.getElementById('scrollbarThumb');
    if(!track||!thumb)return;
    thumb.addEventListener('mousedown',e=>{
      sbDragging=true;sbStartX=e.clientX;sbStartMin=zoomMin;
      thumb.classList.add('dragging');e.preventDefault();
    });
    track.addEventListener('click',e=>{
      if(sbDragging)return;
      const rect=track.getBoundingClientRect();
      const cx=(e.clientX-rect.left)/rect.width;
      const half=(zoomMax-zoomMin)/2;
      zoomMin=Math.max(0,cx-half);zoomMax=zoomMin+(zoomMax-zoomMin);
      if(zoomMax>1){zoomMin=1-(zoomMax-zoomMin);zoomMax=1;}
      applyZoom();
    });
    document.addEventListener('mousemove',e=>{
      if(!sbDragging)return;
      const track2=document.getElementById('scrollbarTrack');
      if(!track2)return;
      const tw=track2.offsetWidth;
      const dx=(e.clientX-sbStartX)/tw;
      const range=zoomMax-zoomMin;
      let lo=sbStartMin+dx,hi=lo+range;
      if(lo<0){hi-=lo;lo=0;}if(hi>1){lo-=hi-1;hi=1;}
      zoomMin=Math.max(0,lo);zoomMax=Math.min(1,hi);
      applyZoom();
    });
    document.addEventListener('mouseup',()=>{
      if(sbDragging){sbDragging=false;document.getElementById('scrollbarThumb')?.classList.remove('dragging');}
    });
    /* Touch sur la scrollbar */
    thumb.addEventListener('touchstart',e=>{
      sbDragging=true;sbStartX=e.touches[0].clientX;sbStartMin=zoomMin;e.preventDefault();
    },{passive:false});
    document.addEventListener('touchmove',e=>{
      if(!sbDragging)return;
      const track2=document.getElementById('scrollbarTrack');if(!track2)return;
      const tw=track2.offsetWidth;
      const dx=(e.touches[0].clientX-sbStartX)/tw;
      const range=zoomMax-zoomMin;
      let lo=sbStartMin+dx,hi=lo+range;
      if(lo<0){hi-=lo;lo=0;}if(hi>1){lo-=hi-1;hi=1;}
      zoomMin=Math.max(0,lo);zoomMax=Math.min(1,hi);
      applyZoom();
    },{passive:false});
    document.addEventListener('touchend',()=>{sbDragging=false;});
  }
  initScrollbar();

  document.addEventListener('touchstart',e=>{
    if(!wrapper()||!wrapper().contains(e.target))return;
    const t=getTouches(e);
    if(t.length===2){
      e.preventDefault();
      startDist=dist(t[0],t[1]);
      startRange=[zoomMin,zoomMax];
    } else if(t.length===1){
      startPan=[zoomMin,zoomMax];
      startX=t[0].clientX;
    }
  },{passive:false});

  document.addEventListener('touchmove',e=>{
    if(!wrapper()||!wrapper().contains(e.target))return;
    const t=getTouches(e);
    if(t.length===2&&startRange){
      e.preventDefault();
      const d=dist(t[0],t[1]);
      const scale=startDist/d; // >1 = zoom in
      const [lo,hi]=startRange;
      const center=(lo+hi)/2;
      const half=(hi-lo)*scale/2;
      zoomMin=Math.max(0,center-half);
      zoomMax=Math.min(1,center+half);
      if(zoomMax-zoomMin<0.05){const c2=(zoomMin+zoomMax)/2;zoomMin=c2-0.025;zoomMax=c2+0.025;}
      applyZoom();
    } else if(t.length===1&&startPan){
      e.preventDefault();
      const dx=t[0].clientX-startX;
      const ww=wrapper().offsetWidth||300;
      const shift=(dx/ww)*(startPan[1]-startPan[0])*-1;
      let lo=startPan[0]+shift,hi=startPan[1]+shift;
      if(lo<0){hi-=lo;lo=0;}
      if(hi>1){lo-=hi-1;hi=1;}
      zoomMin=Math.max(0,lo);zoomMax=Math.min(1,hi);
      applyZoom();
    }
  },{passive:false});

  document.addEventListener('touchend',e=>{
    if(getTouches(e).length<2){startDist=0;startRange=null;}
    if(getTouches(e).length<1){startPan=null;}
  });

  /* Molette souris pour zoom sur PC */
  document.addEventListener('wheel',e=>{
    if(!wrapper()||!wrapper().contains(e.target))return;
    e.preventDefault();
    const rect=wrapper().getBoundingClientRect();
    const cx=(e.clientX-rect.left)/rect.width; // position relative du curseur [0..1]
    const range=zoomMax-zoomMin;
    const factor=e.deltaY>0?1.15:0.87; // scroll bas = zoom out, haut = zoom in
    const newRange=Math.min(1,range*factor);
    // Ancrer le zoom autour du curseur
    let lo=zoomMin+(cx*range)-(cx*newRange);
    let hi=lo+newRange;
    if(lo<0){hi-=lo;lo=0;}
    if(hi>1){lo-=hi-1;hi=1;}
    zoomMin=Math.max(0,lo);zoomMax=Math.min(1,hi);
    if(zoomMax-zoomMin<0.04){const mid=(zoomMin+zoomMax)/2;zoomMin=mid-0.02;zoomMax=mid+0.02;}
    applyZoom();
  },{passive:false});

  /* Double-click PC pour reset zoom */
  document.addEventListener('dblclick',e=>{
    if(!wrapper()||!wrapper().contains(e.target))return;
    zoomMin=0;zoomMax=1;
    if(myChart){delete myChart.options.scales.x.min;delete myChart.options.scales.x.max;myChart.update('none');}
  });

  /* Double-tap pour reset zoom */
  let lastTap=0;
  document.addEventListener('touchend',e=>{
    if(!wrapper()||!wrapper().contains(e.target))return;
    const now=Date.now();
    if(now-lastTap<300){
      zoomMin=0;zoomMax=1;
      if(myChart){delete myChart.options.scales.x.min;delete myChart.options.scales.x.max;myChart.update('none');}
    }
    lastTap=now;
  });
})();

let rt;
window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(()=>{lastW=0;if(myChart)myChart.update();},250);});

/* ── MAJ automatique ── */
let _autoRefreshTimer=null;
function startAutoRefresh(){
  clearInterval(_autoRefreshTimer);
  _autoRefreshTimer=setInterval(()=>{
    if(!_cachedData)return;
    if(_viewMode==='jm1')return; // pas de MAJ auto sur J-1
    const {omMain,omM15,rainMx,probMx}=_cachedData;
    // Recalcule les pts avec l'heure actuelle (now recalculé dans processData)
    lastW=0;
    processData(omMain,omM15,rainMx,probMx);
  }, 5*60*1000); // toutes les 5 minutes

  // Re-fetch complet toutes les 30 min
  setInterval(()=>{
    if(_cachedData) load();
  }, 30*60*1000);
}

load().then(()=>startAutoRefresh()).catch(()=>startAutoRefresh());
</script>
</body>
</html>
