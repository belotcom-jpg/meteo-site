<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pluie Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            padding: 10px;
            min-height: 100dvh;
            overflow-x: hidden;
        }

        .wrap { max-width: 1400px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }

        /* ── Recherche ── */
        .search { display: flex; gap: 8px; }
        input {
            flex: 1; min-width: 0;
            background: #0d0d0d; border: 2px solid #555; border-radius: 10px;
            padding: 13px 12px; color: #fff;
            font-size: clamp(14px, 4vw, 18px); font-weight: 900;
            font-family: 'Courier New', monospace; outline: none;
            -webkit-appearance: none;
        }
        input:focus { border-color: #00ffff; box-shadow: 0 0 10px rgba(0,255,255,0.3); }
        #searchBtn {
            background: #00ffff; color: #000; border: none;
            padding: 0 18px; border-radius: 10px;
            font-weight: 900; cursor: pointer; flex-shrink: 0;
            font-family: 'Courier New', monospace;
            font-size: clamp(12px, 3.5vw, 15px);
            min-height: 52px; min-width: 56px;
            -webkit-appearance: none; transition: background .15s;
        }
        #searchBtn:active { background: #fff; }
        #searchBtn:disabled { background: #333; color: #666; }

        /* ── Carte ── */
        .card {
            background: #080808; border: 2px solid #333;
            border-radius: 16px; overflow: hidden; display: flex; flex-direction: column;
        }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 16px; border-bottom: 1px solid #2a2a2a; gap: 8px;
        }
        .header-left { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
        .city-name {
            font-size: clamp(16px, 5vw, 28px);
            font-weight: 900; text-transform: uppercase; letter-spacing: 2px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .city-tz { font-size: clamp(9px, 2vw, 11px); color: #555; letter-spacing: 1px; }

        .legend { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; flex-shrink: 0; }
        .leg-rain { font-size: clamp(9px, 2.5vw, 12px); font-weight: 900; color: #00ffff; text-shadow: 0 0 8px rgba(0,255,255,0.5); }
        .leg-prob { font-size: clamp(9px, 2.5vw, 12px); font-weight: 900; color: #ffe600; text-shadow: 0 0 8px rgba(255,230,0,0.5); }

        /* ── Chart ── */
        #chartWrapper { position: relative; }
        .canvas-container {
            height: clamp(220px, 45vw, 360px);
            width: 100%;
        }

        /* Séparateurs de jours */
        .sep-line {
            position: absolute; width: 0;
            border-left: 2px dashed rgba(255,255,255,0.75);
            pointer-events: none; z-index: 20;
        }

        /* ── Résumé ── */
        #summaryRow {
            display: flex; border-top: 2px solid #444;
            background: #060606;
            height: clamp(64px, 16vw, 82px);
            overflow: hidden;
        }
        .day-seg {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            flex-shrink: 0; overflow: hidden;
        }
        .day-name {
            font-size: clamp(8px, 2vw, 10px); font-weight: 900;
            color: #666; margin-bottom: 2px; letter-spacing: 1px;
        }
        .day-rain {
            font-size: clamp(13px, 3.8vw, 20px); font-weight: 900;
            color: #00ffff; line-height: 1;
            text-shadow: 0 0 8px rgba(0,255,255,0.5);
        }
        .day-prob { font-size: clamp(10px, 2.5vw, 13px); font-weight: 900; color: #ffe600; margin-top: 1px; }
        .unit     { font-size: 8px; opacity: 0.6; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="search">
        <input id="cityInput" value="Juvisy-sur-Orge"
               onkeypress="if(event.key==='Enter'){this.blur();load()}"
               autocomplete="off" autocorrect="off" spellcheck="false">
        <button id="searchBtn" onclick="load()">GO</button>
    </div>

    <div class="card">
        <div class="header">
            <div class="header-left">
                <div id="displayCity" class="city-name">—</div>
                <div id="displayTz" class="city-tz"></div>
            </div>
            <div class="legend">
                <span class="leg-rain">● PLUIE mm/h</span>
                <span class="leg-prob">-- PROBA %</span>
            </div>
        </div>

        <div id="chartWrapper">
            <div class="canvas-container"><canvas id="mainChart"></canvas></div>
            <div id="summaryRow"></div>
        </div>
    </div>
</div>

<script>
let myChart = null;
let lastW   = 0;
let cityTz  = 'Europe/Paris';

/* ════ LOAD ════════════════════════════════════════════════════ */
async function load() {
    const city = document.getElementById('cityInput').value.trim();
    if (!city) return;
    const btn = document.getElementById('searchBtn');
    btn.disabled = true; btn.textContent = '…';
    try {
        const geo = await fetch(
            `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=fr`
        ).then(r => r.json());
        if (!geo.results?.length) { alert('Ville introuvable'); return; }

        const { latitude, longitude, name } = geo.results[0];
        document.getElementById('displayCity').innerText = name;

        /* forecast_days=11 → indices 0..263 dans hourly */
        const data = await fetch(
            `https://api.open-meteo.com/v1/forecast`
            + `?latitude=${latitude}&longitude=${longitude}`
            + `&hourly=precipitation,precipitation_probability`
            + `&minutely_15=precipitation`
            + `&forecast_days=11&timezone=auto`
        ).then(r => r.json());

        cityTz = data.timezone ?? 'Europe/Paris';
        document.getElementById('displayTz').textContent =
            cityTz + ' · ' + (data.timezone_abbreviation ?? '');

        processData(data);
    } catch (e) {
        console.error(e); alert('Erreur de chargement');
    } finally {
        btn.disabled = false; btn.textContent = 'GO';
    }
}

/* ════ INTERPOLATION minutely_15 ════════════════════════════════ */
function interpM15(m15, slotF, offsetMin) {
    const target = slotF + offsetMin / 15;
    const si     = Math.floor(target);
    const frac   = target - si;
    const v0     = m15[si]     ?? 0;
    const v1     = m15[si + 1] ?? v0;
    return Math.max(0, v0 * (1 - frac) + v1 * frac);
}

/* ════ PROCESS DATA ═════════════════════════════════════════════
   RÈGLE DE DENSITÉ (nombre de points par jour)
   ─────────────────────────────────────────────
   Chart.js espace chaque point de façon identique.
   Pour que les colonnes du résumé aient la même largeur,
   tous les jours J+5…J+10 ont EXACTEMENT 3 pts (0h, 8h, 16h).
   → largeur pixel identique pour les 6 derniers jours.
════════════════════════════════════════════════════════════════ */
function processData(data) {
    const pts = [];

    const cityNow = new Date(new Date().toLocaleString('en-US', { timeZone: cityTz }));
    const h = cityNow.getHours();
    const m = cityNow.getMinutes();
    const s = cityNow.getSeconds();

    const m15   = data.minutely_15?.precipitation ?? [];
    const slotF = h * 4 + (m + s / 60) / 15;

    /* +5' / +10' / +15' / +30' / +45' ── interpolés depuis minutely_15 */
    [5, 10, 15, 30, 45].forEach(off => {
        pts.push({
            t : `+${off}'`, d : 0,
            r : interpM15(m15, slotF, off),
            p : data.hourly.precipitation_probability[h] ?? 0
        });
    });

    /* Aujourd'hui h+1 … 23 */
    for (let i = 1; i <= (23 - h); i++) {
        pts.push({
            t : (h + i) + 'h', d : 0,
            r : data.hourly.precipitation[h + i]             ?? 0,
            p : data.hourly.precipitation_probability[h + i] ?? 0
        });
    }

    /* J+1, J+2 — 3h (8 pts) */
    for (let d = 1; d <= 2; d++) {
        for (let hr = 0; hr < 24; hr += 3) {
            const idx = d * 24 + hr;
            pts.push({ t: hr+'h', d, isNewDay: hr===0,
                r: data.hourly.precipitation[idx]             ?? 0,
                p: data.hourly.precipitation_probability[idx] ?? 0 });
        }
    }

    /* J+3, J+4 — 6h (4 pts) + biais */
    for (let d = 3; d <= 4; d++) {
        for (let hr = 0; hr < 24; hr += 6) {
            const idx = d * 24 + hr;
            pts.push({ t: hr+'h', d, isNewDay: hr===0,
                r: (data.hourly.precipitation[idx]             ?? 0) * 1.2,
                p: Math.min(100, (data.hourly.precipitation_probability[idx] ?? 0) + 10) });
        }
    }

    /* J+5 … J+10 — 8h (3 pts = 0h/8h/16h) + biais
       TOUS les jours J+5..J+10 ont le même nombre de points (3)
       → colonnes identiques, largeurs cohérentes dans le résumé */
    for (let d = 5; d <= 10; d++) {
        for (let hr = 0; hr < 24; hr += 8) {
            const idx = d * 24 + hr;
            pts.push({ t: hr+'h', d, isNewDay: hr===0,
                r: (data.hourly.precipitation[idx]             ?? 0) * 1.2,
                p: Math.min(100, (data.hourly.precipitation_probability[idx] ?? 0) + 10) });
        }
    }

    render(pts);
}

/* ════ RENDER ═══════════════════════════════════════════════════ */
function render(pts) {
    const ctx = document.getElementById('mainChart').getContext('2d');
    if (myChart) myChart.destroy();
    lastW = 0;

    const isMobile = window.innerWidth < 500;

    const rainG = ctx.createLinearGradient(0, 0, 0, 360);
    rainG.addColorStop(0,    'rgba(0,255,255,0.72)');
    rainG.addColorStop(0.55, 'rgba(0,255,255,0.18)');
    rainG.addColorStop(1,    'rgba(0,255,255,0)');

    myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels  : pts.map(p => p.t),
            datasets: [
                {
                    data: pts.map(p => p.r),
                    borderColor: '#00ffff', borderWidth: isMobile ? 1.5 : 2.5,
                    fill: true, backgroundColor: rainG,
                    tension: 0.4, pointRadius: 0, yAxisID: 'y', order: 1
                },
                {
                    data: pts.map(p => p.p),
                    borderColor: '#ffe600', borderWidth: isMobile ? 1.5 : 2,
                    borderDash: [6, 4], tension: 0.4,
                    pointRadius: 0, yAxisID: 'yProb', order: 2
                }
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: false, animation: false,
            scales: {
                x: {
                    ticks: {
                        color: '#bbb',
                        font: { weight: 'bold', size: isMobile ? 8 : 10, family: 'Courier New' },
                        maxRotation: 0, autoSkip: false,
                        callback(val) {
                            const lbl = this.getLabelForValue(val);
                            if (!lbl) return null;
                            if (lbl.includes("'")) return lbl;         // toujours afficher +5' etc.
                            if (isMobile) {
                                const n = parseInt(lbl);
                                if (!isNaN(n) && n % 6 !== 0) return null;
                            }
                            return lbl;
                        }
                    },
                    grid  : { display: false },
                    border: { color: '#555' }
                },

                /* ── Axe pluie — GAUCHE ── */
                y: {
                    position    : 'left',
                    beginAtZero : true,
                    grid        : { color: '#1a1a1a', lineWidth: 1 },
                    ticks       : {
                        color: '#00ffff',
                        font : { weight: 'bold', size: isMobile ? 8 : 11, family: 'Courier New' }
                    },
                    border: { color: '#555' },
                    title : {
                        display: !isMobile, text: 'mm/h',
                        color: '#00ffff', font: { size: 9, family: 'Courier New' }
                    }
                },

                /* ── Axe probabilité — DROITE (visible) ── */
                yProb: {
                    position    : 'right',
                    min         : 0,
                    max         : 100,
                    display     : true,
                    grid        : { display: false },   /* pas de grille dupliquée */
                    ticks       : {
                        color    : '#ffe600',
                        font     : { weight: 'bold', size: isMobile ? 8 : 11, family: 'Courier New' },
                        callback : v => v + '%',
                        stepSize : 25
                    },
                    border: { color: '#555' },
                    title : {
                        display: !isMobile, text: 'prob.',
                        color: '#ffe600', font: { size: 9, family: 'Courier New' }
                    }
                }
            },
            plugins: { legend: { display: false } }
        },
        plugins: [{
            id: 'overlaySync',
            afterDraw(chart) {
                if (chart.width === lastW) return;
                lastW = chart.width;
                buildOverlays(chart, pts);
            }
        }]
    });
}

/* ════ OVERLAYS ═════════════════════════════════════════════════ */
function buildOverlays(chart, pts) {
    const { chartArea, scales: { x }, width: canvasW } = chart;
    const wrapper = document.getElementById('chartWrapper');
    wrapper.querySelectorAll('.sep-line').forEach(el => el.remove());

    /* Index du premier point de chaque jour */
    const dayFirstIdx = {};
    pts.forEach((p, i) => { if (dayFirstIdx[p.d] === undefined) dayFirstIdx[p.d] = i; });
    const days = Object.keys(dayFirstIdx).map(Number).sort((a, b) => a - b);
    const wH   = wrapper.offsetHeight;

    /* xPos pixel pour chaque séparateur de jour */
    const xPos = {};
    days.forEach(d => { xPos[d] = x.getPixelForValue(dayFirstIdx[d]); });

    /* Injection des lignes séparatrices */
    days.slice(1).forEach(d => {
        const line = document.createElement('div');
        line.className  = 'sep-line';
        line.style.left   = xPos[d] + 'px';
        line.style.top    = chartArea.top + 'px';
        line.style.height = (wH - chartArea.top) + 'px';
        wrapper.appendChild(line);
    });

    buildSummary(chart, pts, days, xPos);
}

/* ════ SUMMARY ══════════════════════════════════════════════════ */
function buildSummary(chart, pts, days, xPos) {
    const { chartArea, scales: { x }, width: canvasW } = chart;
    const row      = document.getElementById('summaryRow');
    const dayNames = ['DIM','LUN','MAR','MER','JEU','VEN','SAM'];
    const cityNow  = new Date(new Date().toLocaleString('en-US', { timeZone: cityTz }));

    row.style.paddingLeft  = chartArea.left + 'px';
    row.style.paddingRight = (canvasW - chartArea.right) + 'px';
    row.innerHTML = '';

    days.forEach((d, di) => {
        const date   = new Date(cityNow);
        date.setDate(cityNow.getDate() + d);
        const isLast = di === days.length - 1;

        /* Largeur du segment
           ─────────────────
           Tous les jours J+5..J+10 ont 3 pts → même espacement naturel.
           Pour le dernier jour (J+10) : width = largeur de J+9 (= xPos[J+9]−xPos[J+8]).
           Pour les autres : width = xPos[next] − xPos[current].  */
        let width;
        if (isLast && di >= 2) {
            const dPrev  = days[di - 1];
            const dPrev2 = days[di - 2];
            width = xPos[dPrev] - xPos[dPrev2];
        } else if (isLast && di >= 1) {
            width = xPos[days[di - 1]] - chartArea.left;
        } else {
            const leftPx  = di === 0 ? chartArea.left : xPos[d];
            const rightPx = xPos[days[di + 1]];
            width = Math.max(0, rightPx - leftPx);
        }

        const dayData = pts.filter(p => p.d === d);
        const total   = dayData.reduce((s, p) => s + p.r, 0);
        const maxP    = Math.max(...dayData.map(p => p.p), 0);
        const approx  = d >= 5 ? '~' : '';

        let label;
        if      (d === 0) label = 'AUJ.';
        else if (d <= 7)  label = dayNames[date.getDay()];
        else              label = 'J+' + d;

        const div       = document.createElement('div');
        div.className   = 'day-seg';
        div.style.width = width + 'px';
        div.innerHTML   = `
            <div class="day-name">${label}</div>
            <div class="day-rain">${approx}${total.toFixed(1)}<span class="unit">mm</span></div>
            <div class="day-prob">${Math.round(maxP)}%</div>
        `;
        row.appendChild(div);
    });
}

/* Rerender on rotate */
let rTimer;
window.addEventListener('resize', () => {
    clearTimeout(rTimer);
    rTimer = setTimeout(() => { lastW = 0; if (myChart) myChart.update(); }, 250);
});

load();
</script>
</body>
</html>
